<!--
  ============================================================
  TEAM Group — Shared HTML Component Fragments v1
  Server-side GAS template snippets for inclusion in form pages.

  HOW TO USE — include the whole file with:
      <?!= include('Components') ?>

  Then call individual components with GAS scriptlets:
      <?!= renderLogo() ?>
      <?!= renderTicketInfo(ctx) ?>
      <?!= renderPageHeader('Title', 'Subtitle text') ?>
      <?!= renderSectionTitle('Section Label') ?>
      <?!= renderLoadingOverlay('Submitting...') ?>
      <?!= renderSuccessScreen(opts) ?>

  NOTE: These are server-side helper functions written as GAS
  scriptlets.  They must be included via <?!= include('Components') ?>
  inside a .html file served by HtmlService.
  ============================================================
-->

<script runat="server">

/**
 * Returns the TEAM Group logo block HTML string.
 * @param {string} [height='60px']
 */
function renderLogo(height) {
  height = height || '60px';
  return '<div class="logo-container">' +
    '<img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png" ' +
    'alt="TEAM Group" class="logo" style="height:' + height + ';">' +
    '</div>';
}

/**
 * Returns a page-header block (centered title + subtitle).
 * @param {string} title
 * @param {string} [subtitle]
 */
function renderPageHeader(title, subtitle) {
  var html = '<div class="page-header">' +
    '<h1>' + title + '</h1>';
  if (subtitle) {
    html += '<p class="subtitle">' + subtitle + '</p>';
  }
  html += '</div>';
  return html;
}

/**
 * Returns a red uppercase section-title divider.
 * @param {string} label
 */
function renderSectionTitle(label) {
  return '<div class="section-title">' + label + '</div>';
}

/**
 * Returns a ticket-info grid populated from a context object.
 * Omits rows whose values are falsy.
 *
 * Recognized keys on ctx:
 *   employeeName, jobTitle, jrTitle, department, siteName, hireDate,
 *   employmentType, employeeType, managerName, managerEmail,
 *   requesterEmail, reason, internalEmployeeId, systems (array),
 *   equipmentRaw, originalComments
 *
 * @param {Object} ctx
 */
function renderTicketInfo(ctx) {
  if (!ctx) return '';

  function row(label, value, opts) {
    opts = opts || {};
    if (!value && value !== 0) return '';
    var cls = 'info-row' + (opts.span2 ? ' span-2' : '') + (opts.comments ? ' comments' : '');
    var valStyle = opts.valStyle ? ' style="' + opts.valStyle + '"' : '';
    return '<div class="' + cls + '">' +
      '<span class="label">' + label + '</span>' +
      '<span class="value"' + valStyle + '>' + value + '</span>' +
      '</div>';
  }

  var html = '<div class="ticket-info">';

  html += row('Employee',        ctx.employeeName);
  html += row('Job Title',       ctx.jobTitle);
  html += row('JR Title',        ctx.jrTitle);
  html += row('Department',      ctx.department);
  html += row('Site',            ctx.siteName);
  html += row('Start Date',      ctx.hireDate ? formatTicketDate(ctx.hireDate) : '');
  html += row('Effective Date',  ctx.effDate  ? formatTicketDate(ctx.effDate)  : '');
  html += row('Employment Type', ctx.employmentType);
  html += row('Employee Type',   ctx.employeeType);
  html += row('Manager',         ctx.managerName);
  html += row('Manager Email',   ctx.managerEmail, { valStyle: 'font-size:11px;' });
  html += row('Requester',       ctx.requesterEmail, { valStyle: 'font-size:11px;' });
  html += row('Internal ID',     ctx.internalEmployeeId);
  html += row('Reason',          ctx.reason);

  if (ctx.systems && ctx.systems.length > 0) {
    var sysVal = Array.isArray(ctx.systems) ? ctx.systems.join(', ') : ctx.systems;
    html += row('All Requested Systems', sysVal, { span2: true });
  }
  if (ctx.equipmentRaw) {
    html += row('Full Equipment Request', ctx.equipmentRaw, { span2: true });
  }
  if (ctx.originalComments) {
    html += row('Request Comments', '<em>' + ctx.originalComments + '</em>', { comments: true });
  }

  html += '</div>';
  return html;
}

/**
 * Format a date value for display inside ticket-info rows.
 * Accepts Date objects or strings.
 */
function formatTicketDate(val) {
  if (!val) return '';
  try {
    var d = (val instanceof Date) ? val : new Date(val + 'T12:00:00Z');
    return Utilities.formatDate(d, 'UTC', 'M/d/yyyy');
  } catch(e) {
    return String(val).replace(/-/g, '/');
  }
}

/**
 * Returns the loading overlay div (hidden by default).
 * Shown/hidden via showLoading() / hideLoading() in SharedScripts.
 * @param {string} [label='Processing...']
 */
function renderLoadingOverlay(label) {
  label = label || 'Processing...';
  return '<div id="loading-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; flex-direction:column; z-index:1000;">' +
    '<div class="spinner"></div>' +
    '<p>' + label + '</p>' +
    '</div>';
}

/**
 * Returns a success screen div (hidden by default, shown by showSuccess()).
 *
 * @param {object}  [opts]
 * @param {string}  [opts.icon='✅']
 * @param {string}  [opts.heading='Submitted Successfully']
 * @param {string}  [opts.body='Your submission has been recorded.']
 * @param {string}  [opts.dashboardUrl]  - Pre-baked URL (from getBaseUrl())
 * @param {string}  [opts.btnLabel='Return to Dashboard']
 */
function renderSuccessScreen(opts) {
  opts = opts || {};
  var icon    = opts.icon    || '✅';
  var heading = opts.heading || 'Submitted Successfully';
  var body    = opts.body    || 'Your submission has been recorded.';
  var url     = opts.dashboardUrl || '';
  var label   = opts.btnLabel || 'Return to Dashboard';

  var btnHtml = url
    ? '<a href="' + url + '" class="btn btn-primary" style="max-width:240px;">' + label + '</a>'
    : '<button class="btn btn-primary" style="max-width:240px;" onclick="window.history.back()">Go Back</button>';

  return '<div id="success-screen" style="display:none;">' +
    '<div class="success-icon">' + icon + '</div>' +
    '<h2>' + heading + '</h2>' +
    '<p>' + body + '</p>' +
    '<div class="actions" style="flex-direction:column; align-items:center; gap:12px;">' +
      btnHtml +
      '<p style="color:#888; font-size:13px; margin:0;">You may now close this window.</p>' +
    '</div>' +
    '</div>';
}

/**
 * Returns an inline success replacement for card-level finalize actions
 * (replaces card innerHTML when task is finalized — ActionItemForm pattern).
 *
 * @param {string} [dashboardUrl]  - URL for dashboard link
 * @param {string} [heading='Task Finalized']
 * @param {string} [body]
 */
function renderCardSuccess(dashboardUrl, heading, body) {
  heading = heading || 'Task Finalized';
  body    = body    || 'All data and audit logs have been recorded.';
  var link = dashboardUrl
    ? '<a href="' + dashboardUrl + '" style="display:inline-block; margin-top:16px; padding:12px 28px; background:var(--brand-red); color:white; text-decoration:none; border-radius:8px; font-weight:600; font-size:15px;">Go to Dashboard</a>'
    : '';
  return '<div style="text-align:center; padding:40px;">' +
    '<h1 style="color:var(--success);">&#10003; ' + heading + '</h1>' +
    '<p style="color:var(--text-muted); margin-top:8px;">' + body + '</p>' +
    link +
    '</div>';
}

</script>
