<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TEAM Group — All Screens (Standardized)</title>
<style>
:root{
  --bg:#0c0c0c;--card:#1a1a1a;--text:#fff;--muted:#a0a0a0;
  --red:#EB1C2D;--ibdr:#444;--ibg:#2a2a2a;--bdr:#333;
  --ok:#00c853;--warn:#ffab00;--danger:#f44336;--info:#64b5f6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#080808;color:var(--text);display:flex;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── SIDEBAR ── */
#sidebar{width:220px;flex-shrink:0;background:#0e0e0e;border-right:1px solid #1a1a1a;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-head{padding:14px 16px;border-bottom:1px solid #1a1a1a;}
.sb-logo{color:var(--red);font-weight:700;font-size:13px;display:block;margin-bottom:3px;}
.sb-sub{color:#3a3a3a;font-size:9px;letter-spacing:.5px;text-transform:uppercase;}
.sb-group{padding:14px 12px 4px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#2a2a2a;}
.sb-link{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:#555;text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer;}
.sb-link:hover{color:#aaa;background:rgba(255,255,255,.03);}
.sb-link.active{color:#fff;border-left-color:var(--red);background:rgba(235,28,45,.06);}
.sb-link .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-req{background:var(--info);}
.dot-appr{background:var(--warn);}
.dot-spec{background:var(--ok);}
.dot-off{background:var(--danger);}
.dot-std{background:#666;}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;}
.top-bar{position:sticky;top:0;z-index:100;background:#111;border-bottom:2px solid var(--red);padding:0 20px;display:flex;align-items:center;gap:14px;min-height:44px;}
.tb-title{font-size:12px;color:var(--muted);}
.tb-hint{font-size:11px;color:#2a2a2a;margin-left:auto;}
.screen-block{border-bottom:3px solid #111;}
.screen-label{background:#0f0f0f;border-bottom:1px solid #1a1a1a;padding:9px 24px;display:flex;align-items:center;gap:12px;}
.sl-name{font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;}
.sl-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:3px;}
.type-req {background:rgba(100,181,246,.12);color:var(--info);}
.type-appr{background:rgba(255,171,0,.12);color:var(--warn);}
.type-spec{background:rgba(0,200,83,.12);color:var(--ok);}
.type-off {background:rgba(244,67,54,.12);color:var(--danger);}
.type-std {background:rgba(180,180,180,.08);color:#666;}
.sl-file{font-size:10px;color:#2a2a2a;margin-left:auto;font-family:monospace;}
.conf-toggle-bar{background:#090909;border-top:1px dashed #1a1a1a;padding:9px 20px;display:flex;align-items:center;gap:12px;}
.conf-toggle-bar p{font-size:11px;color:#2a2a2a;}
.ctb{font-size:11px;font-weight:700;font-family:inherit;padding:5px 14px;border-radius:4px;cursor:pointer;border:1px solid #252525;background:transparent;color:#444;transition:all .15s;}
.ctb:hover{color:#fff;border-color:#444;}
.ctb.shown{color:var(--ok);border-color:var(--ok);}

/* ── SIMULATED PAGE — ALL FORMS SAME WIDTH ── */
.sim{background:var(--bg);padding:40px 20px 60px;display:flex;flex-direction:column;align-items:center;}

/* ── DESIGN SYSTEM ── */
.logo-wrap{text-align:center;margin-bottom:22px;width:100%;}
.logo-wrap img{height:60px;}
/* ONE container width for all forms */
.cw{width:95%;max-width:1400px;}
/* ONE card/form wrapper for all forms */
.cf{background:var(--card);padding:36px;border-radius:8px;border:1px solid var(--bdr);box-shadow:0 4px 16px rgba(255,255,255,.04);width:100%;}
/* page context callout */
.pctx{margin-bottom:16px;padding:10px 16px;background:rgba(100,181,246,.06);border:1px solid rgba(100,181,246,.18);border-radius:6px;font-size:12px;color:#9ac8f5;display:flex;align-items:center;gap:10px;width:100%;}
/* section titles — h2 everywhere */
h2.s{color:var(--text);font-size:1.05rem;font-weight:600;border-bottom:1px solid var(--bdr);padding-bottom:9px;margin:28px 0 16px;}
h2.s:first-child{margin-top:0;}
/* ticket info */
.ti{background:rgba(255,255,255,.02);border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid var(--bdr);display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.ir{display:flex;flex-direction:column;font-size:13px;}
.ir .l{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.ir .v{color:var(--text);font-weight:600;}
.ir.s2{grid-column:span 2;}
.ir.chg .v{color:var(--info);}
/* inputs */
.ff{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.req{color:var(--red);}
.fi{width:100%;padding:10px 13px;font-size:13px;font-family:inherit;border:1px solid var(--ibdr);border-radius:6px;background:var(--ibg);color:var(--text);box-sizing:border-box;}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
/* radio group */
.rg{display:flex;border:1px solid var(--ibdr);border-radius:6px;overflow:hidden;background:var(--ibg);}
.rg label{flex:1;position:relative;margin:0;}
.rg label:not(:last-child){border-right:1px solid var(--ibdr);}
.rg input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.rb{display:block;padding:9px 14px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);}
.rg input[type=radio]:checked+.rb{background:var(--red);color:#fff;}
/* checkbox tiles */
.cbt{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px;margin-top:4px;}
.ct{display:flex;align-items:center;padding:9px 12px;background:var(--ibg);border:1px solid var(--ibdr);border-radius:6px;cursor:pointer;font-size:13px;gap:8px;}
.ct input{accent-color:var(--red);width:15px;height:15px;flex-shrink:0;}
.ct.on{border-color:var(--red);color:var(--red);font-weight:600;background:rgba(235,28,45,.08);}
/* expanding sub-section */
.sub-sec{margin-top:8px;padding:14px 16px;background:#1e1e1e;border-radius:6px;border:1px solid #2e2e2e;display:none;}
.sub-sec.open{display:block;}
.sub-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:block;}
/* compact checkbox grid */
.cbg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;}
.cbg label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--text);padding:6px 8px;border-radius:4px;}
.cbg label:hover{background:rgba(255,255,255,.04);}
.cbg input{accent-color:var(--red);width:14px;height:14px;flex-shrink:0;}
/* ── CHECKLIST TABLE — used for ALL step lists ── */
.cht{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px;}
.cht th{text-align:left;padding:9px 12px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--bdr);}
.cht td{padding:10px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
.cht tr:last-child td{border-bottom:none;}
.cht .cn{font-weight:600;display:block;margin-bottom:2px;}
.cht .cs{font-size:11px;color:var(--muted);}
/* status button group */
.sbg{display:flex;background:var(--ibg);border:1px solid var(--ibdr);border-radius:5px;overflow:hidden;width:fit-content;}
.sb{padding:6px 11px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;border-right:1px solid var(--ibdr);font-family:inherit;white-space:nowrap;}
.sb:last-child{border-right:none;}
.sb.p{background:var(--warn);color:#000;}
.sb.c{background:var(--ok);color:#fff;}
.sb.n{background:var(--danger);color:#fff;}
/* ── HR DECISION BUTTONS — larger / more prominent ── */
.decision-wrap{margin-bottom:16px;}
.decision-wrap .fl{margin-bottom:10px;}
.dtog{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--ibdr);border-radius:8px;overflow:hidden;width:100%;}
.dt{padding:16px 24px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;transition:all .15s;text-align:center;}
.dt:first-child{border-right:2px solid var(--ibdr);}
.dt:hover{background:rgba(255,255,255,.05);color:#fff;}
.dt.on-approve{background:var(--ok);color:#fff;border-color:var(--ok);}
.dt.on-approve:first-child{border-right-color:rgba(0,0,0,.2);}
.dt.on-reject{background:#444;color:#fff;}
/* status badge */
.bdg{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.b-open{background:rgba(235,28,45,.1);color:var(--red);border:1px solid var(--red);}
.b-pend{background:rgba(255,171,0,.1);color:var(--warn);border:1px solid var(--warn);}
.b-ok{background:rgba(0,200,83,.1);color:var(--ok);border:1px solid var(--ok);}
/* callouts */
.co{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px;}
.co-i{background:rgba(100,181,246,.07);border:1px solid rgba(100,181,246,.2);color:#9ac8f5;}
.co-w{background:rgba(255,171,0,.07);border:1px solid rgba(255,171,0,.2);color:#ffcc02;}
/* form header (title + badge) */
.fhdr{margin-bottom:24px;}
.fhdr .bdg{margin-bottom:10px;}
.fhdr h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.fhdr p{color:var(--muted);font-size:13px;}
/* buttons */
.btn{display:inline-block;padding:12px 22px;border:none;border-radius:8px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;}
.btn-p{background:var(--red);color:#fff;}
.btn-s{background:#2a2a2a;color:#fff;border:1px solid var(--bdr);}
.btn-full{width:100%;display:block;}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--bdr);}
.act1{margin-top:24px;padding-top:20px;border-top:1px solid var(--bdr);}
/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:16px 20px;}
.stat .sv{font-size:28px;font-weight:700;margin-bottom:4px;}
.stat .sl2{font-size:12px;color:var(--muted);}
/* dashboard table */
.dtbl{width:100%;border-collapse:collapse;font-size:13px;}
.dtbl th{text-align:left;padding:10px 12px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--bdr);}
.dtbl td{padding:11px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
.dtbl tr:last-child td{border-bottom:none;}
/* confirmation screen — identical for every form */
.conf-screen{text-align:center;padding:52px 24px;}
.conf-screen .ci{font-size:56px;margin-bottom:16px;}
.conf-screen h2{color:var(--ok);font-size:22px;font-weight:700;margin:0 0 10px;}
.conf-screen p{color:var(--muted);font-size:14px;margin-bottom:26px;max-width:440px;margin-left:auto;margin-right:auto;}
.conf-screen .cb{max-width:220px;display:block;margin:0 auto;}
.conf-screen .cx{color:#444;font-size:12px;margin-top:12px;}
/* email */
.email-frame{background:#f4f4f4;border-radius:8px;overflow:hidden;max-width:620px;margin:0 auto;}
.email-hdr{background:#0c0c0c;padding:24px;text-align:center;}
.email-body{background:#fff;padding:32px;color:#1a1a1a;}
.email-body h2{font-size:20px;font-weight:700;margin-bottom:14px;}
.email-body p{font-size:14px;color:#444;line-height:1.7;margin-bottom:14px;}
.eib{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:6px;padding:14px 18px;margin:16px 0;}
.eib .ei{display:flex;flex-direction:column;margin-bottom:8px;}
.eib .ei:last-child{margin-bottom:0;}
.eib .el{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:2px;}
.eib .ev{font-weight:600;color:#1a1a1a;font-size:14px;}
.ecta{display:block;background:#EB1C2D;color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:14px 24px;border-radius:8px;text-align:center;margin:22px 0;}
.eftr{background:#f0f0f0;padding:14px 24px;font-size:11px;color:#888;text-align:center;border-top:1px solid #ddd;}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sb-head">
    <span class="sb-logo">🎨 All Screens</span>
    <span class="sb-sub">Standardized Mockups</span>
  </div>
  <div id="sb-links"></div>
</nav>

<div id="main">
  <div class="top-bar">
    <span class="tb-title">TEAM Group — All HTML Views · One width · One checklist style · One confirmation</span>
    <span class="tb-hint">Toggle button shows confirmation state for each form</span>
  </div>
  <div id="screens"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */

// Checklist table — used for ALL step lists, no exceptions
// Notes column is ALWAYS present. Row data r[2]==='3' triggers 3-state buttons (Asset Retrieval only).
function cht(rows) {
  var h = '<table class="cht"><thead><tr><th>Step</th><th style="width:160px;">Status</th><th>Notes / Comments</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var btns = r[2] === '3'
      ? '<div class="sbg"><button class="sb p">Pending</button><button class="sb">Collected</button><button class="sb">Not Returned</button></div>'
      : '<div class="sbg"><button class="sb p">Pending</button><button class="sb">Complete</button></div>';
    h += '<tr><td><span class="cn">'+r[0]+'</span>'+(r[1]?'<span class="cs">'+r[1]+'</span>':'')+'</td><td>'+btns+'</td><td><textarea class="fi" rows="2" placeholder="Notes..."></textarea></td></tr>';
  });
  return h + '</tbody></table>';
}

// Ticket info
function ti(rows){
  var h = '<div class="ti">';
  rows.forEach(function(r){
    h += '<div class="ir'+(r[2]?' '+r[2]:'')+'"><span class="l">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>';
  });
  return h + '</div>';
}

// Spec form header
function specHdr(title, sub, badgeClass){
  badgeClass = badgeClass || 'b-open';
  return '<div class="fhdr"><span class="bdg '+badgeClass+'">'+({
    'b-open':'Open','b-pend':'Pending Approval','b-ok':'Closed'
  }[badgeClass] || 'Open')+'</span><h1>'+title+' — Jane Doe</h1><p>'+sub+'</p></div>';
}

// Confirmation screen — identical for every form
function confScreen(title, msg){
  return '<div class="sim"><div class="cw"><div class="logo-wrap"><img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png" alt="TEAM Group"></div><div class="cf"><div class="conf-screen"><div class="ci">✅</div><h2>'+title+'</h2><p>'+msg+'</p><button class="btn btn-p cb">Return to Dashboard</button><p class="cx">You may close this window.</p></div></div></div></div>';
}

/* ══════════════════════════════════════════════════════
   SCREEN DEFINITIONS
══════════════════════════════════════════════════════ */
var SCREENS = [

/* ─── REQUEST FORMS ─── */
{id:'initial-request', file:'InitialRequest.html', name:'New Employee Request', type:'req', typeLabel:'Request Form',
 conf:{title:'Request Submitted', msg:'Your new hire request for <strong>Jane Doe</strong> has been submitted to HR. You will receive an email confirmation when the request is reviewed.'},
 html:function(){return `

</div>
</div>

<h2 class="s">Equipment</h2>
<div class="ff"><label class="fl">Select all that apply</label>
<div class="cbt">
  <label class="ct on"><input type="checkbox" checked><span>Laptop (Windows)</span></label>

</div>

  <span class="sub-lbl">Credit Card — Select Types Required</span>

</div>

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
var TYPE_LABELS={req:'REQUEST FORMS',appr:'APPROVAL FORMS',spec:'SPECIALIST — ONBOARDING',off:'SPECIALIST — OFFBOARDING',std:'STANDARDS'};
var DOT_MAP={req:'dot-req',appr:'dot-appr',spec:'dot-spec',off:'dot-off',std:'dot-std'};
var TYPE_MAP={req:'type-req',appr:'type-appr',spec:'type-spec',off:'type-off',std:'type-std'};

function renderAll(){
  var main=document.getElementById('screens');
  var sb=document.getElementById('sb-links');
  var lastGrp=null;
  SCREENS.forEach(function(s,i){
    if(s.type!==lastGrp){lastGrp=s.type;var g=document.createElement('div');g.className='sb-group';g.textContent=TYPE_LABELS[s.type];sb.appendChild(g);}
    var a=document.createElement('div');a.className='sb-link';
    a.innerHTML='<span class="dot '+DOT_MAP[s.type]+'"></span>'+s.name;
    a.onclick=(function(id){return function(){document.getElementById('scr-'+id).scrollIntoView({behavior:'smooth'});};})(s.id);
    sb.appendChild(a);
    var block=document.createElement('div');block.className='screen-block';block.id='scr-'+s.id;
    var lbl='<div class="screen-label"><span class="sl-name">'+s.name+'</span><span class="sl-type '+TYPE_MAP[s.type]+'">'+s.typeLabel+'</span><span class="sl-file">'+s.file+'</span></div>';
    var formDiv='<div id="form-'+s.id+'">'+s.html()+'</div>';
    var confDiv='';var toggleBar='';
    if(s.conf){
      confDiv='<div id="conf-'+s.id+'" style="display:none;">'+confScreen(s.conf.title,s.conf.msg)+'</div>';
      toggleBar='<div class="conf-toggle-bar"><p>Confirmation screen shown in-place after submit — identical layout for every form</p><button class="ctb" id="ctb-'+s.id+'" onclick="toggleConf(\''+s.id+'\')">Show Confirmation ↓</button></div>';
    }
    block.innerHTML=lbl+formDiv+toggleBar+confDiv;
    main.appendChild(block);
  });
}

function toggleConf(id){
  var f=document.getElementById('form-'+id),c=document.getElementById('conf-'+id),b=document.getElementById('ctb-'+id);
  var showing=c.style.display!=='none';
  f.style.display=showing?'block':'none';c.style.display=showing?'none':'block';
  b.textContent=showing?'Show Confirmation ↓':'Show Form ↑';b.classList.toggle('shown',!showing);
}

function onScroll(){
  var links=document.querySelectorAll('.sb-link');
  SCREENS.forEach(function(s,i){
    var el=document.getElementById('scr-'+s.id);if(!el)return;
    var r=el.getBoundingClientRect();
    if(r.top<=60&&r.bottom>60){links.forEach(function(l){l.classList.remove('active');});if(links[i])links[i].classList.add('active');}
  });
}

document.addEventListener('DOMContentLoaded',function(){renderAll();document.getElementById('main').addEventListener('scroll',onScroll);});
</script>
