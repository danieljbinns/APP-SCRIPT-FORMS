<!DOCTYPE html>
<html>

<head>
    <title>Live Org Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body {
            background: #0c0c0c;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            color: white;
            margin-bottom: 20px;
        }

        /* CUSTOM NODE STYLING (The magic happens here) */
        .org-node {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            width: 200px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .org-node img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
        }

        .org-node .info {
            display: flex;
            flex-direction: column;
        }

        .org-node .name {
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
        }

        .org-node .title {
            color: #a0a0a0;
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .org-node .dept {
            color: #EB1C2D;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Override Google Chart Connectors to Dark Mode */
        .google-visualization-orgchart-lineleft {
            border-left: 2px solid #555 !important;
        }

        .google-visualization-orgchart-lineright {
            border-right: 2px solid #555 !important;
        }

        .google-visualization-orgchart-linebottom {
            border-bottom: 2px solid #555 !important;
        }

        .google-visualization-orgchart-table {
            background: transparent !important;
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <h2>Live Directory Structure</h2>
        <button style="background:#EB1C2D; color:white; border:none; padding:8px 16px; border-radius:4px;">Export
            PDF</button>
    </div>

    <div id="chart_div"></div>

    <script>
        google.charts.load('current', { packages: ["orgchart"] });
        google.charts.setOnLoadCallback(drawChart);

        function drawChart() {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'Name');
            data.addColumn('string', 'Manager');
            data.addColumn('string', 'ToolTip');

            // SIMULATED DIRECTORY DATA WITH PHOTOS
            const users = [
                { id: 'ceo', name: 'Alice Walker', title: 'CEO', dept: 'Executive', manager: '', photo: 'https://i.pravatar.cc/150?u=alice' },
                { id: 'cto', name: 'Bob Smith', title: 'Chief Technology Officer', dept: 'Technology', manager: 'ceo', photo: 'https://i.pravatar.cc/150?u=bob' },
                { id: 'cfo', name: 'Charlie Day', title: 'CFO', dept: 'Finance', manager: 'ceo', photo: 'https://i.pravatar.cc/150?u=charlie' },
                { id: 'vp_eng', name: 'Diana King', title: 'VP Engineering', dept: 'Technology', manager: 'cto', photo: 'https://i.pravatar.cc/150?u=diana' },
                { id: 'dev_lead', name: 'Evan Stone', title: 'Lead Developer', dept: 'Engineering', manager: 'vp_eng', photo: 'https://i.pravatar.cc/150?u=evan' }
            ];

            const rows = users.map(u => {
                const html = `
                    <div class="org-node">
                        <img src="${u.photo}" alt="${u.name}">
                        <div class="info">
                            <span class="name">${u.name}</span>
                            <span class="title">${u.title}</span>
                            <span class="dept">${u.dept}</span>
                        </div>
                    </div>
                `;
                return [{ v: u.id, f: html }, u.manager, u.title];
            });

            data.addRows(rows);
            var chart = new google.visualization.OrgChart(document.getElementById('chart_div'));
            chart.draw(data, { 'allowHtml': true, 'size': 'large' });
        }
    </script>
</body>

</html>
