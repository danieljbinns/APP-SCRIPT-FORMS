<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --brand-red: #EB1C2D;
            --brand-red-hover: #c41522;
            --border-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: left;
            background: #222;
        }

        button {
            background-color: var(--brand-red);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--brand-red-hover);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        button.secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            margin-top: 0.5rem;
        }

        button.secondary:hover {
            color: white;
            border-color: white;
        }
    </style>
</head>

<body>
    <div class="card" id="mainCard">
        <h1>Welcome, <span id="userName">Employee</span></h1>
        <p>Please confirm your setup status below.</p>

        <div class="status-item">
            <div>
                <strong>Email Access</strong>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Confirm you can log in</div>
            </div>
            <input type="checkbox" id="emailCheck" style="transform: scale(1.5); accent-color: var(--brand-red);">
        </div>

        <div class="status-item">
            <div>
                <strong>Computer Received</strong>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Hardware delivered</div>
            </div>
            <input type="checkbox" id="hardwareCheck" style="transform: scale(1.5); accent-color: var(--brand-red);">
        </div>

        <button id="submitBtn" onclick="submitConfirmation()">Confirm Setup Complete</button>
        <button class="secondary" onclick="reportIssue()">Report an Issue</button>
    </div>

    <script>
        function submitConfirmation() {
            const emailConfirmed = document.getElementById('emailCheck').checked;
            const hardwareConfirmed = document.getElementById('hardwareCheck').checked;

            if (!emailConfirmed) {
                alert("Please confirm you have accessed your email first.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.textContent = "Processing...";
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('mainCard').innerHTML = "<h1 style='color:#00c853'>Thank You!</h1><p>Your setup is confirmed.</p>";
            }, 1000);
        }

        function reportIssue() {
            alert("Please contact IT Helpdesk at support@robinsonsolutions.com");
        }
    </script>
</body>

</html>
