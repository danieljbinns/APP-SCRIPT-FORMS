<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --card: #1a1a1a;
            --text: #ffffff;
            --muted: #a0a0a0;
            --brand: #EB1C2D;
            --border: #333;
            --success: #00c853;
            --warning: #ffab00;
            --danger: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        header {
            padding: 20px;
            border-bottom: 2px solid var(--brand);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text);
        }

        .toolbar {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th,
        td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: var(--muted);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Conditional Formatting */
        .status-overdue {
            background-color: rgba(220, 38, 38, 0.2) !important;
            border-left: 3px solid var(--danger);
        }

        .action-btn {
            background: var(--brand);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #c41828;
        }

        #searchInput {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 300px;
            background: var(--bg);
            color: var(--text);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Employee Onboarding Dashboard V2.1</h1>
            <button id="refreshBtn" class="action-btn">Refresh</button>
        </header>

        <div class="toolbar">
            <input type="text" placeholder="Search..." id="searchInput"
                style="padding: 6px; border: 1px solid #ddd; border-radius: 4px; width: 300px;">
        </div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead>
                    <tr id="headerRow">
                        <!-- Headers injected via JS -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Initialize
        google.script.run
            .withSuccessHandler(renderTable)
            .withFailureHandler(function (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="color:#EB1C2D;">Error: ' + error.message + '</td></tr>';
            })
            .getDashboardDataVNext();

        function renderTable(data) {
            console.log('Received data:', data);

            if (!data || !data.headers || !data.rows) {
                console.error('Invalid data structure:', data);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="color:#EB1C2D;">Error: Invalid data format received</td></tr>';
                return;
            }

            const headers = data.headers;
            const rows = data.rows;

            // Render Headers
            const headerRow = document.getElementById('headerRow');
            headerRow.innerHTML = '';

            // Add custom Action header first
            const actionTh = document.createElement('th');
            actionTh.textContent = 'Actions';
            headerRow.appendChild(actionTh);

            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                headerRow.appendChild(th);
            });

            // Render Body
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            rows.forEach(row => {
                const tr = document.createElement('tr');

                // Conditional Formatting Logic
                if (row.timeOpenDays > 3 && row.status !== 'Complete') {
                    tr.classList.add('status-overdue');
                }

                // Actions Column
                const actionTd = document.createElement('td');
                const resendBtn = document.createElement('button');
                resendBtn.textContent = 'Resend User Email';
                resendBtn.className = 'action-btn';
                resendBtn.onclick = () => resendEmail(row.workflowId);
                actionTd.appendChild(resendBtn);
                tr.appendChild(actionTd);

                // Data Columns
                row.rawData.forEach((cellData, index) => {
                    const td = document.createElement('td');
                    td.textContent = cellData;
                    td.style.cursor = 'pointer';
                    td.title = 'Click to edit';
                    td.onclick = () => openEditModal(row.workflowId, headers[index], cellData);
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        function resendEmail(id) {
            if (confirm('Resend email for Workflow ID: ' + id + '?')) {
                google.script.run.withSuccessHandler(function (res) {
                    alert(res.message);
                }).resendStageEmail(id, 'CURRENT_STAGE'); // would need to infer stage
            }
        }

        // Edit Modal Logic
        function openEditModal(id, field, value) {
            const modal = document.getElementById('editModal');
            const overlay = document.getElementById('modalOverlay');

            document.getElementById('editId').textContent = id;
            document.getElementById('editField').textContent = field;
            document.getElementById('editValue').value = value;
            document.getElementById('editValue').dataset.id = id;
            document.getElementById('editValue').dataset.field = field;

            overlay.style.display = 'block';
            modal.style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('editModal').style.display = 'none';
        }

        function saveEdit() {
            const input = document.getElementById('editValue');
            const id = input.dataset.id;
            const field = input.dataset.field;
            const newVal = input.value;

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            google.script.run.withSuccessHandler(function (res) {
                alert(res.message);
                closeEditModal();
                saveBtn.textContent = 'Save';
                saveBtn.disabled = false;
                // Refresh table to show changes
                document.getElementById('refreshBtn').click();
            }).updateWorkflowField(id, field, newVal);
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">Refreshing...</td></tr>';
            google.script.run.withSuccessHandler(renderTable).getDashboardDataVNext();
        });

    </script>

    <!-- Edit Modal -->
    <div id="modalOverlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999;"
        onclick="closeEditModal()"></div>
    <div id="editModal"
        style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1a1a; color:#fff; padding:20px; border-radius:8px; z-index:1000; width:300px; box-shadow:0 4px 20px rgba(0,0,0,0.5); border:1px solid #333;">
        <h3 style="margin-top:0; color:#fff;">Edit Field</h3>
        <p><strong>ID:</strong> <span id="editId"></span></p>
        <p><strong>Field:</strong> <span id="editField"></span></p>
        <input type="text" id="editValue"
            style="width:100%; padding:8px; display:block; margin-bottom:15px; border:1px solid #333; border-radius:4px; background:#0c0c0c; color:#fff;">
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeEditModal()"
                style="background:#333; color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Cancel</button>
            <button id="saveBtn" onclick="saveEdit()"
                style="background:#EB1C2D; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Save</button>
        </div>
    </div>

</body>

</html>
