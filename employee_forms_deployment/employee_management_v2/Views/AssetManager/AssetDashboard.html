<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .warning {
            border-left: 4px solid #f59e0b;
        }

        .danger {
            border-left: 4px solid #ef4444;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 200px;
        }
    </style>
</head>

<body>
    <h1>Asset & License Command Center</h1>

    <div class="grid">
        <!-- Hardware Section -->
        <div class="card">
            <h2>Hardware Assets</h2>
            <div style="margin-bottom:20px;">
                <input type="text" placeholder="Scan Serial Number..." id="serialInput">
                <button onclick="lookupAsset()">Lookup</button>
            </div>

            <div id="assetResult" style="display:none; padding:15px; background:#eff6ff; border-radius:8px;">
                <strong>MacBook Pro 16 (C02...)</strong><br>
                <span style="color:#2563eb;">Assigned to: John Doe</span><br><br>
                <button onclick="alert('Returned!')">Check In</button>
                <button style="background:#ef4444;">Report Lost</button>
            </div>
        </div>

        <!-- License Section -->
        <div class="card">
            <h2>License Utilization</h2>
            <div id="licenseList">
                <!-- Injected via JS -->
                <div class="stat-row danger">
                    <div><strong>Adobe CC</strong></div>
                    <div>10 / 10 used (100%)</div>
                </div>
                <div class="stat-row warning">
                    <div><strong>SiteDocs</strong></div>
                    <div>95 / 100 used (95%)</div>
                </div>
                <div class="stat-row">
                    <div><strong>Fleetio</strong></div>
                    <div>30 / 50 used (60%)</div>
                </div>
            </div>
            <button style="width:100%; margin-top:10px;">Purchase More Seats</button>
        </div>
    </div>

    <!-- Org Chart Link -->
    <div class="card" style="margin-top:20px;">
        <h2>Organization</h2>
        <p>View the live reporting hierarchy based on Google Workspace / ADP data.</p>
        <a href="?form=org_chart" target="_blank"><button>Open Org Chart</button></a>
    </div>

    <script>
        function lookupAsset() {
            var serial = document.getElementById('serialInput').value;
            if (serial) {
                document.getElementById('assetResult').style.display = 'block';
            }
        }
    </script>
</body>

</html>
