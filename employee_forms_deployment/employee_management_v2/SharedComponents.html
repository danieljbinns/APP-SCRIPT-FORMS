<!--
  ══════════════════════════════════════════════════════════════════
  Theme switcher — 3-state button group (Dark | Light | AODA)
  Self-contained CSS + JS. Works on any page regardless of whether
  Styles.html is included. Single localStorage key 'tg_theme'
  with values 'dark' | 'light' | 'aoda'. Mutually exclusive.
  ══════════════════════════════════════════════════════════════════
-->
<style>
  /* ── Theme switcher — vertical collapsible panel, right edge ─── */
  .theme-switcher {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    border-radius: 8px 0 0 8px;
    overflow: hidden;
    box-shadow: -2px 2px 10px rgba(0,0,0,0.35);
  }
  /* Panel — the 3 buttons stacked vertically */
  .ts-panel {
    display: flex;
    flex-direction: column;
    background: var(--card-bg, #1e1e1e);
    border: 1px solid var(--border-color, #444);
    border-right: none;
    border-radius: 8px 0 0 8px;
    overflow: hidden;
    max-width: 38px;
    max-height: 200px;
    opacity: 1;
    transition: max-width 0.2s ease, max-height 0.2s ease, opacity 0.15s ease;
  }
  .theme-switcher.ts-collapsed .ts-panel {
    max-width: 0;
    max-height: 0;
    opacity: 0;
    border: none;
  }
  /* Handle tab — always visible, flush to right edge */
  .ts-handle {
    width: 14px;
    min-height: 42px;
    background: var(--brand-red, #eb1c2d);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    opacity: 0.75;
    transition: opacity 0.15s;
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    font-family: inherit;
  }
  .ts-handle:hover { opacity: 1; }
  /* Arrow points left (›) when collapsed = click to expand */
  .theme-switcher.ts-collapsed .ts-handle { opacity: 0.6; }
  /* Buttons */
  .ts-btn {
    width: 38px;
    height: 36px;
    border: none;
    border-bottom: 1px solid var(--border-color, #444);
    background: transparent;
    color: var(--text-muted, #888);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    font-size: 10px;
    font-weight: 800;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  .ts-btn:last-child { border-bottom: none; }
  .ts-btn svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .ts-btn:hover {
    background: rgba(235,28,45,0.12);
    color: var(--brand-red, #eb1c2d);
  }
  .ts-btn.ts-active {
    background: var(--brand-red, #eb1c2d);
    color: #ffffff;
  }
  .ts-btn.ts-active:hover {
    background: var(--brand-red, #eb1c2d);
    color: #ffffff;
  }

  /* Light mode */
  body.light-mode .ts-panel {
    background: #ffffff;
    border-color: #cccccc;
  }
  body.light-mode .ts-btn {
    color: #666;
    border-bottom-color: #cccccc;
  }

  /* AODA mode */
  body.aoda-mode .ts-panel {
    background: #ffffff;
    border: 2px solid #000000;
  }
  body.aoda-mode .ts-btn {
    color: #000000;
    border-bottom: 1px solid #000000;
    height: 38px;
    font-size: 11px;
  }
  body.aoda-mode .ts-btn:last-child { border-bottom: none; }
  body.aoda-mode .ts-btn:hover {
    background: #f0f0f0;
    color: #a50000;
  }
  body.aoda-mode .ts-btn.ts-active {
    background: #000000;
    color: #ffffff;
  }
  body.aoda-mode .ts-handle {
    background: #000000;
  }
</style>

<!--
  ══════════════════════════════════════════════════════════════════
  IT Confirmation Pattern — reusable gatekeeper between HR and IT Setup
  ══════════════════════════════════════════════════════════════════
  Purpose:
    Dave Langohr reviews the full request after HR has verified and corrected
    employee details. He can edit any field before IT proceeds with provisioning.
    Applies to: new hire (NEW_EMP_), equipment request (EQUIP_REQ_), status
    change (CHANGE_). Does NOT apply to terminations.

  Server-side (ITConfirmationHandler.js → serveITConfirmation):
    - Detects workflow type from ID prefix (NEW_EMP_ / EQUIP_REQ_ → InitialRequest.html,
      CHANGE_ → PositionSiteChangeRequest.html).
    - Passes to template: mode='it_confirmation', baseMode=<original mode>,
      workflowId, requestData (JSON string), referenceData (JSON string).
    - getFullNewHireData / getFullPositionChangeData read the full row from the
      relevant sheet and return all fields as a flat object.
    - submitITConfirmation writes corrections back in-place to Initial Requests sheet,
      appends an audit row to IT Confirmation Results, and triggers the IT Setup email.

  Client-side (InitialRequest.html / PositionSiteChangeRequest.html):
    - FORM_MODE='it_confirmation' detected from [mode] template var.
    - INJECTED_REQUEST_DATA holds the full request JSON (parsed from requestData).
    - IT_CONFIRM_WF_ID holds the workflow ID for the submit call.
    - After populateAll() populates all dropdowns and dual-lists, prefillITConfirmation()
      is called to pre-populate all form fields with the existing request data.
    - prefillITConfirmation() rebuilds dual-lists with selected values, sets radios/
      checkboxes, and fires UI toggle functions to reveal dependent sections.
    - Submit routes to google.script.run.submitITConfirmation(data) instead of the
      normal submitInitialRequest / submitPositionChangeRequest.

  Adding it_confirmation to a new form:
    1. Add FORM_MODE / INJECTED_REQUEST_DATA / IT_CONFIRM_WF_ID var injection.
    2. Skip any gatekeeper/intro section when FORM_MODE==='it_confirmation'.
    3. Write a prefill<FormName>(d) function that sets all field values from d.
    4. Call prefill at end of dropdown population callback.
    5. Add notes textarea + change button label in it_confirmation mode.
    6. Route submit to submitITConfirmation and show success screen.
  ══════════════════════════════════════════════════════════════════
-->
<script>
  /* ══════════════════════════════════════════════════════════════
     Shared utilities — escapeHtml, formatDate, renderWorkflowFields
     Defined here once; Dashboard.html and RequestDetails.html rely
     on this via include('SharedComponents') in the page template.
  ══════════════════════════════════════════════════════════════ */

  /**
   * HTML-escape a value for safe injection into innerHTML.
   */
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /**
   * Format a date string or Date to M/d/yyyy.
   * Returns '-' for empty / invalid input.
   */
  function formatDate(dateStr) {
    if (!dateStr) return '-';
    if (dateStr instanceof Date) {
      if (isNaN(dateStr.getTime())) return '-';
      return (dateStr.getMonth() + 1) + '/' + dateStr.getDate() + '/' + dateStr.getFullYear();
    }
    // Already formatted M/d/yyyy or m/d/yyyy — pass through
    if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(String(dateStr))) return String(dateStr);
    const d = new Date(String(dateStr).replace(/\//g, '-'));
    if (isNaN(d.getTime())) return String(dateStr);
    return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
  }

  /**
   * renderWorkflowFields(r, wfId)
   *
   * Returns an HTML string — a <div class="detail-grid"> block — containing
   * all relevant fields for the given workflow.  Called from both:
   *   • Dashboard.html  → renderModalDetails() (overlay)
   *   • RequestDetails.html → renderDetails() (full page snapshotGrid)
   *
   * @param {Object} r    — requestData flat object from getRequestDetails /
   *                        getTerminationDetails / getChangeDetails / etc.
   * @param {string} wfId — Workflow ID (used to detect type from prefix)
   * @returns {string} HTML
   */
  function renderWorkflowFields(r, wfId) {
    r = r || {};
    wfId = wfId || '';
    var _di = function(label, val) {
      if (val == null || val === '' || val === 'N/A') return '';
      return '<div class="detail-item"><label>' + escapeHtml(label) + '</label><div>' + escapeHtml(val) + '</div></div>';
    };
    var _diRaw = function(label, html) {
      if (!html) return '';
      return '<div class="detail-item"><label>' + escapeHtml(label) + '</label><div>' + html + '</div></div>';
    };

    var html = '<div class="detail-grid">';

    if (wfId.startsWith('CHANGE_')) {
      var changeAttach = r['Attachment URL'] || '';
      html +=
        // ── Identity ──
        _di('Workflow ID',           wfId) +
        _di('Employee',              r['Employee Name']) +
        _di('Effective Date',        r['Effective Date']) +
        _di('Date Requested',        r['Date Requested']) +
        _di('Current Site',          r['Site Name'] || r['Current Site']) +
        _di('Department',            r['Department']) +
        _di('Current Classification',r['Current Classification'] || r['Current Class']) +
        _di('Current Title',         r['Current Title']) +
        _di('Current Manager',       (r['Current Manager Name'] || '') + (r['Current Manager Email'] ? ' \xb7 ' + r['Current Manager Email'] : '') || null) +
        _di('Receiving Manager',     r['Receiving Manager Email']) +
        _di('Requester',             (r['Requester Name'] || '') + (r['Requester Email'] ? ' \xb7 ' + r['Requester Email'] : '') || null) +
        // ── What's changing ──
        _di('Changes',               r['Change Type'] || r['Change Types']) +
        _di('Title Change',          r['Title Change (Old -> New)']) +
        _di('Site Transfer',         r['Site Transfer (Old -> New)']) +
        _di('Classification Change', r['Classification (Old -> New)']) +
        _di('Manager Change',        r['Manager Change (Old -> New)']) +
        _di('Reassign Old Reports To', r['Reassign Old Reports To']) +
        _di('New Reports From',      r['New Reports From']) +
        _di('Google Account',        r['Google Account']) +
        // ── Systems & Access ──
        _di('Systems Added',         r['Systems Added']) +
        _di('Access Removal',        r['Removed Access']) +
        // ── BOSS ──
        _di('BOSS Training Only',    r['BOSS Training Only']) +
        _di('BOSS Committees',       r['BOSS Sites']) +
        _di('BOSS Cost Sheet',       r['BOSS Cost Sheet']) +
        _di('BOSS Cost Jobs',        r['BOSS Cost Jobs']) +
        _di('BOSS Trip Reports',     r['BOSS Trip Reports']) +
        _di('BOSS Grievances',       r['BOSS Grievances']) +
        // ── ADP ──
        _di('ADP Sites',             r['ADP Sites']) +
        _di('ADP Salary Access',     r['ADP Salary Access']) +
        // ── Jonas / Purchasing ──
        _di('Purchasing Sites',      r['Purchasing Sites']) +
        _di('Jonas Job Numbers',     r['Jonas Job Numbers']) +
        // ── JR / 30-60-90 ──
        _di('JR Required',           r['JR Required']) +
        _di('JR Assignment',         r['JR Assignment']) +
        _di('30/60/90 Plan',         r['30/60/90 Plan']) +
        // ── Equipment ──
        _di('Equipment',             r['Equipment']) +
        _di('Equipment to Return',   r['Equipment to Return']) +
        // ── Computer ──
        _di('Computer Request',      r['Computer Req']) +
        _di('Computer Type',         r['Computer Type']) +
        _di('Computer Prev User',    r['Computer Prev User']) +
        _di('Computer Prev Type',    r['Computer Prev Type']) +
        _di('Computer Serial',       r['Computer Serial']) +
        _di('Office 365',            r['Office 365']) +
        // ── Phone ──
        _di('Phone Request',         r['Phone Req']) +
        _di('Phone Prev User',       r['Phone Prev User']) +
        _di('Phone Prev Number',     r['Phone Prev Number']) +
        // ── Credit Card ──
        _di('CC USA',                r['CC USA']) +
        _di('CC Limit USA',          r['CC Limit USA']) +
        _di('CC Canada',             r['CC Canada']) +
        _di('CC Limit Canada',       r['CC Limit Canada']) +
        _di('CC Home Depot',         r['CC Home Depot']) +
        _di('CC Limit Home Depot',   r['CC Limit Home Depot']) +
        // ── Other ──
        _di('Comments',              r['Comments']) +
        (changeAttach ? _diRaw('Documentation', '<a href="' + escapeHtml(changeAttach) + '" target="_blank" style="color:#EB1C2D;">View Attached File</a>') : '');

    } else if (wfId.startsWith('TERM_')) {
      var termAttach = r['Attachment URL'] || r['Attachment Url'] || '';
      html +=
        _di('Workflow ID',    wfId) +
        _di('Employee',       r['Employee Name']) +
        _di('Employee Type',  r['Employee Type']) +
        _di('Site',           r['Site']) +
        _di('Term Date',      r['Term Date'] || r['Termination Date']) +
        _di('Reason',         r['Reason']) +
        _di('Requester',      r['Requester Email']) +
        (termAttach ? _diRaw('Documentation', '<a href="' + escapeHtml(termAttach) + '" target="_blank" style="color:#EB1C2D;">View Attached File</a>') : '');

    } else if (wfId.startsWith('EQUIP_REQ_')) {
      var eqName = ((r['First Name'] || '') + ' ' + (r['Last Name'] || '')).trim() || r['Employee Name'] || '';
      html +=
        _di('Workflow ID',   wfId) +
        _di('Employee',      eqName) +
        _di('Position',      r['Position Title']) +
        _di('Site',          r['Site Name'] || r['Site']) +
        _di('Department',    r['Department']) +
        _di('Equipment',     r['Equipment']) +
        _di('Systems',       r['Systems']) +
        _di('Date Requested',r['Date Requested']) +
        _di('Manager',       (r['Manager Name'] || '') + (r['Manager Email'] ? ' \xb7 ' + r['Manager Email'] : '') || null) +
        _di('Requester',     (r['Requester Name'] || '') + (r['Requester Email'] ? ' \xb7 ' + r['Requester Email'] : '') || null) +
        _di('Comments',      r['Comments']);

    } else {
      // Onboarding (NEW_EMP_ prefix or bare numeric)
      html +=
        _di('Workflow ID',    wfId) +
        _di('First Name',     r['First Name']) +
        _di('Last Name',      r['Last Name']) +
        _di('Employment Type',r['Employment Type']) +
        _di('Employee Type',  r['Employee Type']) +
        _di('Position Title', r['Position Title'] || r['HR Verified Title'] || r['Position/JR Title']) +
        _di('Department',     r['Department']) +
        _di('Site',           r['Site/Office Location'] || r['Site Name'] || r['Site']) +
        _di('Job Site #',     r['Job Site #']) +
        _di('Start Date',     r['Hire Date'] || r['Hire/Start Date']) +
        _di('System Access',  r['System Access']) +
        _di('Manager',        (r['Manager Name'] || '') + (r['Manager Email'] ? ' \xb7 ' + r['Manager Email'] : '') || null) +
        _di('Requester',      (r['Requester Name'] || '') + (r['Requester Email'] ? ' \xb7 ' + r['Requester Email'] : '') || null) +
        _di('Date Requested', r['Date Requested']);
    }

    html += '</div>';
    return html;
  }
</script>

<script>
  /* ══════════════════════════════════════════════════════════════
     Dual-List Picker — shared widget
     Usage: buildDualList(containerId, items, fieldName, selected)
       containerId — id of the placeholder <div>
       items       — full list of options (string[])
       fieldName   — hidden input name written to the form
       selected    — pre-selected values (string[], optional)
     The widget writes a comma-separated hidden input on every
     change so standard form serialisation picks it up.
  ══════════════════════════════════════════════════════════════ */
  /* ══════════════════════════════════════════════════════════════
     submitSpecialistTask — shared submit handler for all specialist
     and simple action forms that call submitSpecialistForm().

     Usage:
       document.getElementById('taskForm').addEventListener('submit', function(e) {
         e.preventDefault();
         // optional pre-submit validation here — return early if invalid
         var data = { workflowId: ..., department: ..., notes: ..., details: ... };
         submitSpecialistTask(e.target, data, 'Setup Complete', 'Submission recorded.');
       });

     Parameters:
       formEl         — the <form> element to hide on success (pass e.target)
       data           — object passed to submitSpecialistForm()
       successTitle   — text shown in #successTitle
       successMessage — text shown in #successMessage
  ══════════════════════════════════════════════════════════════ */
  function submitSpecialistTask(formEl, data, successTitle, successMessage) {
    var submitBtn = document.getElementById('submitBtn');
    var statusMsg = document.getElementById('statusMessage');
    var overlay   = document.getElementById('loading-overlay');

    submitBtn.disabled = true;
    overlay.classList.add('active');
    statusMsg.innerHTML = '';

    google.script.run
      .withSuccessHandler(function(result) {
        overlay.classList.remove('active');
        if (result && result.success === false) {
          submitBtn.disabled = false;
          statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; ' + (result.message || 'Server returned an error.') + '</div>';
        } else {
          formEl.style.display = 'none';
          document.getElementById('requestHeaderWrap').style.display = 'none';
          document.getElementById('successTitle').textContent    = successTitle;
          document.getElementById('successMessage').textContent  = successMessage || 'Submission recorded.';
          document.getElementById('successRequestId').textContent = 'Workflow: ' + data.workflowId;
          document.getElementById('successAnotherLink').style.display = 'none';
          document.getElementById('success-screen').style.display = 'block';
        }
      })
      .withFailureHandler(function(err) {
        overlay.classList.remove('active');
        submitBtn.disabled = false;
        statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; ' + err.message + '</div>';
      })
      .submitSpecialistForm(data);
  }

  function buildDualList(containerId, items, fieldName, selected) {
    var container = document.getElementById(containerId);
    if (!container) return;
    selected = selected || [];
    items = items || [];
    var available = items.filter(function(i) { return selected.indexOf(i) < 0; });
    var chosen    = items.filter(function(i) { return selected.indexOf(i) >= 0; });
    function render() {
      container.style.cssText = 'width:100%;display:block;';
      container.innerHTML = '';
      var hidden = document.createElement('input');
      hidden.type = 'hidden'; hidden.name = fieldName; hidden.value = chosen.join(', ');
      container.appendChild(hidden);
      var wrapper = document.createElement('div'); wrapper.className = 'dual-list-wrapper';
      function makePanel(headerText, searchId, listId) {
        var panel = document.createElement('div'); panel.className = 'dual-list-panel';
        var hdr = document.createElement('div'); hdr.className = 'dual-list-panel-header'; hdr.textContent = headerText; panel.appendChild(hdr);
        var srch = document.createElement('input'); srch.type = 'text'; srch.className = 'dual-list-search'; srch.placeholder = 'Filter...'; srch.id = searchId; panel.appendChild(srch);
        var lst = document.createElement('div'); lst.className = 'dual-list-list'; lst.id = listId; panel.appendChild(lst);
        var ftr = document.createElement('div'); ftr.className = 'dual-list-footer'; panel.appendChild(ftr);
        return { panel: panel, search: srch, list: lst, footer: ftr, header: hdr };
      }
      var av = makePanel('Available', containerId+'_av_s', containerId+'_av_l');
      var addAllBtn = document.createElement('button'); addAllBtn.type = 'button'; addAllBtn.className = 'dual-list-btn'; addAllBtn.textContent = 'Add All'; av.footer.appendChild(addAllBtn);
      var arrows = document.createElement('div'); arrows.className = 'dual-list-arrows';
      var addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.className = 'dual-list-arrow add-arrow'; addBtn.textContent = '›'; arrows.appendChild(addBtn);
      var remBtn = document.createElement('button'); remBtn.type = 'button'; remBtn.className = 'dual-list-arrow remove-arrow'; remBtn.textContent = '‹'; arrows.appendChild(remBtn);
      var sel = makePanel('Selected', containerId+'_sel_s', containerId+'_sel_l');
      var remAllBtn = document.createElement('button'); remAllBtn.type = 'button'; remAllBtn.className = 'dual-list-btn'; remAllBtn.textContent = 'Remove All'; sel.footer.appendChild(remAllBtn);
      wrapper.appendChild(av.panel); wrapper.appendChild(arrows); wrapper.appendChild(sel.panel);
      container.appendChild(wrapper);
      function buildItems(lst, arr, term) {
        lst.innerHTML = '';
        arr.forEach(function(val) {
          if (term && val.toLowerCase().indexOf(term.toLowerCase()) < 0) return;
          var item = document.createElement('div'); item.className = 'dual-list-item'; item.textContent = val; item.dataset.value = val;
          item.addEventListener('click', function() { item.classList.toggle('selected'); });
          item.addEventListener('dblclick', function() { move(val, lst === av.list ? 'add' : 'remove'); });
          lst.appendChild(item);
        });
      }
      function move(val, dir) {
        if (dir === 'add') { var i = available.indexOf(val); if (i >= 0) { available.splice(i,1); chosen.push(val); } }
        else               { var i = chosen.indexOf(val);    if (i >= 0) { chosen.splice(i,1); available.push(val); } }
        available.sort(); chosen.sort(); refresh();
      }
      function refresh() {
        av.header.textContent  = 'Available (' + available.length + ')';
        sel.header.textContent = 'Selected ('  + chosen.length   + ')';
        buildItems(av.list,  available, av.search.value);
        buildItems(sel.list, chosen,    sel.search.value);
        hidden.value = chosen.join(', ');
      }
      addBtn.addEventListener('click',    function() { av.list.querySelectorAll('.dual-list-item.selected').forEach(function(el) { move(el.dataset.value, 'add'); }); });
      remBtn.addEventListener('click',    function() { sel.list.querySelectorAll('.dual-list-item.selected').forEach(function(el) { move(el.dataset.value, 'remove'); }); });
      addAllBtn.addEventListener('click', function() { var t = av.search.value.toLowerCase(); available.filter(function(v) { return !t || v.toLowerCase().indexOf(t) >= 0; }).slice().forEach(function(v) { move(v, 'add'); }); });
      remAllBtn.addEventListener('click', function() { chosen.slice().forEach(function(v) { move(v, 'remove'); }); });
      av.search.addEventListener('input',  function() { buildItems(av.list,  available, av.search.value); });
      sel.search.addEventListener('input', function() { buildItems(sel.list, chosen,    sel.search.value); });
      refresh();
    }
    render();
  }
</script>

<script>
  /* ══════════════════════════════════════════════════════════════
     Theme Switcher — 3-state button group (Dark | Light | AODA)
     Single key 'tg_theme': 'dark' | 'light' | 'aoda'
     Mutually exclusive. Injects .theme-switcher group on every page.
  ══════════════════════════════════════════════════════════════ */
  (function() {
    var KEY = 'tg_theme';

    var MOON_SVG = '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    var SUN_SVG  = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/>'
                 + '<line x1="12" y1="1" x2="12" y2="3"/>'
                 + '<line x1="12" y1="21" x2="12" y2="23"/>'
                 + '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>'
                 + '<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>'
                 + '<line x1="1" y1="12" x2="3" y2="12"/>'
                 + '<line x1="21" y1="12" x2="23" y2="12"/>'
                 + '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>'
                 + '<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';

    function applyTheme(theme) {
      document.body.classList.remove('light-mode', 'aoda-mode');
      if (theme === 'light') document.body.classList.add('light-mode');
      if (theme === 'aoda')  document.body.classList.add('aoda-mode');
    }

    function setActive(group, theme) {
      group.querySelectorAll('.ts-btn').forEach(function(b) {
        b.classList.toggle('ts-active', b.dataset.theme === theme);
      });
    }

    function init() {
      var saved        = localStorage.getItem(KEY) || 'dark';
      var PANEL_KEY    = 'tg_theme_panel';
      var panelOpen    = localStorage.getItem(PANEL_KEY) !== 'closed';

      // Apply theme immediately to prevent flash
      applyTheme(saved);

      // Wrapper
      var group = document.createElement('div');
      group.className = 'theme-switcher' + (panelOpen ? '' : ' ts-collapsed');
      group.setAttribute('role', 'group');
      group.setAttribute('aria-label', 'Display theme');

      // Panel (holds the 3 buttons)
      var panel = document.createElement('div');
      panel.className = 'ts-panel';

      var BUTTONS = [
        { theme: 'dark',  html: MOON_SVG, tip: 'Dark mode'                           },
        { theme: 'light', html: SUN_SVG,  tip: 'Light mode'                          },
        { theme: 'aoda',  html: 'AODA',   tip: 'High-contrast mode (AODA / WCAG AA)' }
      ];

      BUTTONS.forEach(function(def) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ts-btn';
        btn.dataset.theme = def.theme;
        btn.innerHTML = def.html;
        btn.title = def.tip;
        btn.setAttribute('aria-label', def.tip);
        btn.addEventListener('click', function() {
          localStorage.setItem(KEY, def.theme);
          applyTheme(def.theme);
          setActive(group, def.theme);
        });
        panel.appendChild(btn);
      });

      // Handle tab (always visible, toggles panel)
      var handle = document.createElement('button');
      handle.type = 'button';
      handle.className = 'ts-handle';
      handle.title = 'Toggle theme switcher';
      handle.setAttribute('aria-label', 'Toggle theme switcher');
      handle.innerHTML = panelOpen ? '›' : '‹';
      handle.addEventListener('click', function() {
        var isOpen = !group.classList.contains('ts-collapsed');
        if (isOpen) {
          group.classList.add('ts-collapsed');
          handle.innerHTML = '‹';
          localStorage.setItem(PANEL_KEY, 'closed');
        } else {
          group.classList.remove('ts-collapsed');
          handle.innerHTML = '›';
          localStorage.setItem(PANEL_KEY, 'open');
        }
      });

      group.appendChild(panel);
      group.appendChild(handle);
      document.body.appendChild(group);
      setActive(group, saved);
    }

    if (document.body) {
      init();
    } else {
      document.addEventListener('DOMContentLoaded', init);
    }
  })();

  // ── Formula-injection blur guard ──────────────────────────────────────────
  // Runs on every form page. Attaches a blur listener to all text inputs and
  // textareas. If a value starts with = + - @ the field is flagged inline so
  // the user can correct it before submission. Server-side validation in
  // validateRequiredFields() is the authoritative backstop.
  (function () {
    var FORMULA_CHARS = ['=', '+', '-', '@'];
    var ERROR_ATTR    = 'data-formula-error';

    function checkField(el) {
      var val = (el.value || '').trimStart();
      if (val.length > 0 && FORMULA_CHARS.indexOf(val[0]) !== -1) {
        flagField(el);
      } else {
        clearFlag(el);
      }
    }

    function flagField(el) {
      if (el.getAttribute(ERROR_ATTR)) return; // already flagged
      el.style.borderColor = '#c0392b';
      var msg = document.createElement('div');
      msg.setAttribute(ERROR_ATTR, '1');
      msg.style.cssText = 'color:#c0392b;font-size:0.8em;margin-top:2px;';
      msg.textContent   = 'Value cannot start with =, +, -, or @';
      el.setAttribute(ERROR_ATTR, '1');
      el.parentNode.insertBefore(msg, el.nextSibling);
    }

    function clearFlag(el) {
      if (!el.getAttribute(ERROR_ATTR)) return;
      el.style.borderColor = '';
      el.removeAttribute(ERROR_ATTR);
      var next = el.nextSibling;
      if (next && next.getAttribute && next.getAttribute(ERROR_ATTR)) {
        next.parentNode.removeChild(next);
      }
    }

    function attach(el) {
      el.addEventListener('blur',  function () { checkField(el); });
      el.addEventListener('input', function () { if (el.getAttribute(ERROR_ATTR)) checkField(el); });
    }

    function attachAll() {
      document.querySelectorAll('input[type="text"], input[type="email"], input:not([type]), textarea')
        .forEach(attach);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', attachAll);
    } else {
      attachAll();
    }
  })();
</script>
