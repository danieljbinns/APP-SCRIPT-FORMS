<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Status Change Approval</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --brand-red: #EB1C2D;
            --input-bg: #2a2a2a;
            --input-border: #444;
            --border-color: #333;
            --success: #00c853;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px;
            border: 1px solid var(--border-color);
        }

        .info-grid {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .section-title {
            color: var(--brand-red);
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin: 20px 0 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }

        select,
        textarea,
        input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--brand-red);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Status Change Approval</h1>
            <p style="color:#888; text-align:center;">HR Review required for position/site changes</p>

            <div class="info-grid">
                <div class="info-row"><span>Employee:</span><span>
                        <?= requestData.employeeName ?>
                    </span></div>
                <div class="info-row"><span>Changes:</span><span>
                        <?= requestData.changes ?>
                    </span></div>
                <div class="info-row"><span>Effective Date:</span><span>
                        <?= requestData.effDate ?>
                    </span></div>
                <div class="info-row"><span>Current Site:</span><span>
                        <?= requestData.siteName ?>
                    </span></div>
            </div>

            <form id="approvalForm">
                <input type="hidden" name="workflowId" value="<?= workflowId ?>">

                <div class="form-group">
                    <label>Decision</label>
                    <select name="decision" required>
                        <option value="Approved">Approve Change</option>
                        <option value="Rejected">Reject</option>
                    </select>
                </div>

                <div class="section-title">Workflow Logic</div>

                <label class="checkbox-label">
                    <input type="checkbox" name="isTransfer" id="isTransfer"
                        onchange="document.getElementById('receivingSec').style.display = this.checked ? 'block' : 'none'">
                    <span>This is a Site Transfer (Requires notification to receiving manager)</span>
                </label>

                <div id="receivingSec" style="display:none;" class="form-group">
                    <label>Receiving Manager Email</label>
                    <input type="email" name="receivingManagerEmail" placeholder="manager@team-group.com">
                </div>

                <div class="form-group">
                    <label>Trigger IT Setup (If equipment/systems needed)</label>
                    <select name="nextSteps">
                        <option value="Complete">No IT Action Needed</option>
                        <option value="IT Setup">Trigger IT Setup Form</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="3"></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">Submit Decision</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('approvalForm').onsubmit = function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const formData = {
                workflowId: this.workflowId.value,
                decision: this.decision.value,
                notes: this.notes.value,
                isTransfer: this.isTransfer.checked,
                receivingManagerEmail: this.receivingManagerEmail.value,
                nextSteps: this.nextSteps.value
            };

            google.script.run
                .withSuccessHandler(function (res) {
                    if (res.success) {
                        document.querySelector('.card').innerHTML = `<div style="text-align:center; padding:40px;"><h2>✓ Action Completed</h2><p>${res.message}</p></div>`;
                    } else {
                        alert('Error: ' + res.message);
                        btn.disabled = false;
                        btn.textContent = 'Submit Decision';
                    }
                })
                .submitPositionChangeApproval(formData);
        }
    </script>
</body>

</html>
