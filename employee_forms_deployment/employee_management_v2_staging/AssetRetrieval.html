<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Collection Confirmation</title>
    <?!= include('Styles') ?>
</head>

<body class="card-layout">
    <div class="container-narrow">
        <a href="<?= getBaseUrl() ?>?form=dashboard" target="_top" class="back-link">&#8592; Back to Portal</a>
        <div class="card">
            <div class="logo-container">
                <img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png"
                    alt="Team Group" class="logo">
            </div>
            <h1>Asset Collection</h1>
            <p class="subtitle">Please confirm that company assets have been recovered</p>

            <div class="ticket-info">
                <div class="info-row"><span class="label">Terminated Employee</span><span class="value"><?= requestData.empName ?></span></div>
                <div class="info-row"><span class="label">Site</span><span class="value"><?= requestData.siteName ?></span></div>
            </div>

            <form id="retrievalForm">
                <input type="hidden" name="workflowId" value="<?= workflowId ?>">

                <div class="section-title">Verified Checklist</div>
                <? if(requestData.hasPhone) { ?>
                <div class="confirm-item">
                    <input type="checkbox" id="phoneCheck" name="phone" value="Collected" required>
                    <label for="phoneCheck"><strong>Mobile Phone Collected</strong></label>
                </div>
                <? } ?>

                <? if(requestData.hasLaptop) { ?>
                <div class="confirm-item">
                    <input type="checkbox" id="laptopCheck" name="laptop" value="Collected" required>
                    <label for="laptopCheck"><strong>Computer / Laptop Collected</strong></label>
                </div>
                <div class="confirm-item">
                    <input type="checkbox" id="serialCheck" name="serial" value="Verified" required>
                    <label for="serialCheck"><strong>Serial Number Verified Match</strong></label>
                </div>
                <? } ?>

                <div class="confirm-item">
                    <input type="checkbox" id="keysCheck" name="keys" value="Collected" required>
                    <label for="keysCheck"><strong>Keys / Badge Collected</strong></label>
                </div>

                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea name="notes" rows="3"
                        placeholder="Condition of equipment, missing items, etc."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Confirm Collection Receipt</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('retrievalForm').onsubmit = function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Confirming...';

            const formData = {
                workflowId: this.workflowId.value,
                phone: this.phone ? this.phone.checked : 'N/A',
                laptop: this.laptop ? this.laptop.checked : 'N/A',
                serial: this.serial ? this.serial.checked : 'N/A',
                keys: this.keys.checked,
                notes: this.notes.value
            };

            google.script.run
                .withSuccessHandler(function (res) {
                    if (res.success) {
                        document.querySelector('.card').innerHTML = `<div style="text-align:center; padding:40px;"><div style="color:var(--success); font-size:40px; margin-bottom:16px;">✓</div><h2>Collection Confirmed</h2><p>${res.message}</p></div>`;
                    } else {
                        alert('Error: ' + res.message);
                        btn.disabled = false;
                        btn.textContent = 'Confirm Collection Receipt';
                    }
                })
                .withFailureHandler(function(err) { btn.disabled = false; btn.textContent = 'Confirm Collection Receipt'; alert('Error: ' + err.message); })
                .submitAssetRetrieval(formData);
        }
    </script>
  <?!= include('SharedComponents') ?>
</body>

</html>
