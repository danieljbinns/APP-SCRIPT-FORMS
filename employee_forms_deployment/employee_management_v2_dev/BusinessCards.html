<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Cards Setup</title>
  <?!= include('Styles') ?>
</head>
<body>
  <div class="container">
    <a href="<?= getBaseUrl() ?>" target="_top" class="back-link">&#8592; Back to Portal</a>
    <div class="logo-container">
      <img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png" alt="Team Group Companies" class="logo">
    </div>
    <div id="form-container" class="card-form">
      <h1>Business Cards Setup</h1>
      <p class="subtitle">Confirm that digital business cards have been created and sent for this employee.</p>
      <hr>
      <div id="requestHeaderWrap">
        <?!= includeWithData('RequestHeader', {requestData: requestData}) ?>
      </div>
      <form id="taskForm" autocomplete="off">
        <input type="hidden" name="workflowId" value="<?= workflowId ?>">
        <input type="hidden" name="formId" value="<?= formId !== undefined ? formId : '' ?>">
        <input type="hidden" name="department" value="businesscards">

        <div class="confirm-item">
          <input type="checkbox" id="bizCardsCreated" name="bizCardsCreated" value="true">
          <label for="bizCardsCreated">
            <strong>Create and Send Digital Business Cards</strong>
            <span>Digital business cards have been created and sent to the employee for their role and contact details.</span>
          </label>
        </div>

        <div class="form-field">
          <label>Notes <span class="optional">(Optional)</span></label>
          <textarea name="notes" rows="3" placeholder="Card details, template used, or any other notes..."></textarea>
        </div>
        <div id="statusMessage"></div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Confirm Complete</button>
      </form>
      <?!= includeWithData('SuccessScreen', {baseUrl: getBaseUrl()}) ?>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Saving...</p>
  </div>

  <script>
    document.getElementById('taskForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!document.getElementById('bizCardsCreated').checked) {
        document.getElementById('statusMessage').innerHTML = '<div class="callout callout-warning">&#10060; Please confirm digital business cards have been created and sent before submitting.</div>';
        return;
      }
      var form = e.target;
      var data = {
        workflowId: form.workflowId.value,
        department: form.department.value,
        notes: form.notes.value,
        details: JSON.stringify({ bizCardsCreated: true })
      };
      submitSpecialistTask(e.target, data, 'Business Cards Complete', 'Submission recorded.');
    });
  </script>
  <?!= include('SharedComponents') ?>
  <?!= include('GeoCities') ?>
</body>
</html>
