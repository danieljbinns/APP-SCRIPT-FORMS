}

@keyframes geo-float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes geo-shake    {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)}
  40%{transform:translateX(3px)}   60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
}
@keyframes geo-pulse-border {
  0%,100%{border-color:#ff0000;box-shadow:0 0 8px #ff0000}
  25%    {border-color:#ffff00;box-shadow:0 0 8px #ffff00}
  50%    {border-color:#00ff00;box-shadow:0 0 8px #00ff00}
  75%    {border-color:#0088ff;box-shadow:0 0 8px #0088ff}

@keyframes geo-marquee-bg {
  0%{background-position:0 0} 100%{background-position:400px 0}

@keyframes geo-neon {

<script>
/* ============================================================
   GeoCities Mode Engine v1.0
   No template literals (GAS sandbox compatibility).
   No globals -- everything in IIFE.
   ============================================================ */
(function() {

  var GEO_KEY = 'tg_geo_v1';
  var KONAMI  = [38,38,40,40,37,39,37,39,66,65];
  var kIdx    = 0;
  var geoOn   = false;
  var tTimer  = null;
  var origTitle = document.title;
  var lClicks = 0;
  var lTimer  = null;
  var statsOpen = true;

  var GEO_TITLES = [
    '~~*~~ ' + origTitle + ' ~~*~~',
    '*** GEOCITIES MODE ACTIVATED ***',
    '!!! BEST VIEWED IN NETSCAPE 4.0 !!!',
    '~~*~~ ' + origTitle + ' ~~*~~',
    '>>> SUBMIT YOUR REQUESTS HERE <<<',
    '--- Y2K COMPLIANT WEBSITE ---'
  ];
  var tIdx = 0;

  var STATUS_MAP = {
    'In Progress':               'WORKIN ON IT!! :-)',
    'Pending':                   'WAITING... (dont touch!!)',
    'Completed':                 'DONE!! YOU WIN!!! 8-)',
    'Cancelled':                 'RIP... (cancelled) :-(',
    'Action Required':           '!! ACTION REQUIRED !!',
    'All Specialists Complete':  'ALL DONE!! PARTY TIME!! :-D',
    'Pending: IT Setup':         'WAITING ON IT DEPT...',
    'Pending: ID Setup':         'WAITING ON HR/PAYROLL...'
  };

  var SUBMIT_TEXTS = [
    'CLICK HERE TO SUBMIT!!! [>]',
    'GO GO GO!! SUBMIT NOW!!',
    'YES!! SEND IT!! [>>]',
    'CLICK TO SUBMIT!! FREE!!',
    'SUBMIT!! (it is free!!)'
  ];

  /* ---- State -------------------------------------------- */
  function isOn()   { try { return localStorage.getItem(GEO_KEY) === '1'; } catch(e) { return false; } }
  function setPref(v) { try { if(v) localStorage.setItem(GEO_KEY,'1'); else localStorage.removeItem(GEO_KEY); } catch(e){} }

  /* ---- Toggle ------------------------------------------- */
  function toggle() { if (geoOn) deactivate(); else activate(); }

  /* ---- Activate ----------------------------------------- */
  function activate() {
    geoOn = true;
    setPref(true);
    document.body.classList.add('geocities');
    injectTopBar();
    injectMarquee();
    injectFixedFooter();
    injectExitBadge();
    injectStatsPanel();
    swapStatus(true);
    swapSubmit(true);
    startTitleBlink();
    toast('GEOCITIES MODE ACTIVATED!! \\o/  (Konami again to exit)');
  }

  /* ---- Deactivate --------------------------------------- */
  function deactivate() {
    geoOn = false;
    setPref(false);
    document.body.classList.remove('geocities');
    var ids = ['geo-top-bar','geo-marquee-bar','geo-fixed-footer','geo-exit-badge','geo-stats-panel-wrap'];
    ids.forEach(function(id) { var el=document.getElementById(id); if(el && el.parentNode) el.parentNode.removeChild(el); });
    swapStatus(false);
    swapSubmit(false);
    stopTitleBlink();
    toast('GeoCities mode off. Back to the future. :(');
  }

  /* ---- Top rainbow bar ---------------------------------- */
  function injectTopBar() {
    if (document.getElementById('geo-top-bar')) return;
    var el = document.createElement('div');
    el.id = 'geo-top-bar';
    el.className = 'geo-top-bar';
    el.textContent = 'BEST VIEWED IN NETSCAPE NAVIGATOR 4.0 AT 800x600 -- FRAMES-FREE -- JAVASCRIPT ENABLED -- Y2K COMPLIANT';
    document.body.insertBefore(el, document.body.firstChild);
  }

  /* ---- Scrolling marquee -------------------------------- */
  function injectMarquee() {

      '&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;' +
      'NO FAX REQUIRED -- SUBMIT YOUR REQUESTS ONLINE!!' +
      '&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;' +
      'PAPERLESS SINCE 2024!! SAVING TREES ONE FORM AT A TIME!!' +
      '&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;' +
      'NEW!! EQUIPMENT &amp; SYSTEMS REQUEST NOW AVAILABLE!!' +
      '&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;' +
      'AIM: TeamGroupHR &nbsp;|&nbsp; ICQ: 867-5309 &nbsp;|&nbsp; BEST HR INTRANET SITE 1997' +
      '&nbsp;&nbsp;&nbsp;' +
      '</marquee>';

  /* ---- Fixed scrolling footer --------------------------- */
  function injectFixedFooter() {

      '<marquee scrollamount="3" direction="right">' +
      '&nbsp; Email: hr@team-group.com &nbsp;|&nbsp;' +
      ' Office Hours: 9am-5pm EST &nbsp;|&nbsp;' +
      ' This site is Y2K compliant &nbsp;|&nbsp;' +
      ' SSL secured &nbsp;|&nbsp;' +
      ' Running on GOOGLE APPS SCRIPT (like GeoCities Pro but free!!) &nbsp;|&nbsp;' +
      ' No frames!! &nbsp;|&nbsp;' +
      ' &lt;/&gt; HTML coded by hand in Notepad.exe &lt;/&gt;' +
      ' &nbsp;' +

  /* ---- Exit badge --------------------------------------- */
  function injectExitBadge() {
    if (document.getElementById('geo-exit-badge')) return;
    var el = document.createElement('div');
    el.id = 'geo-exit-badge';
    el.className = 'geo-exit-badge';
    el.innerHTML = '[GEO MODE ON]<br>click to exit';
    el.title = 'Click to disable GeoCities mode (or press Konami code again)';
    el.addEventListener('click', toggle);
    document.body.appendChild(el);
  }

  /* ---- Stats panel -------------------------------------- */
  function injectStatsPanel() {
    if (document.getElementById('geo-stats-panel-wrap')) return;

    var anchor = document.querySelector('header') ||
                 document.querySelector('.header') ||
                 document.querySelector('.container') ||
                 document.body;

    var wrap = document.createElement('div');
    wrap.id = 'geo-stats-panel-wrap';
    wrap.className = 'geo-stats-panel';
    wrap.innerHTML =
      '<div class="geo-stats-header" id="geo-stats-hdr">' +
        '<span class="geo-stats-header-title">' +
          '&#9733; SITE STATISTICS &#9733; LIVE DATA &#9733; UPDATED EVERY PAGE LOAD &#9733;' +
        '</span>' +
        '<span class="geo-stats-toggle-hint">[click to collapse]</span>' +
      '</div>' +
      '<div class="geo-stats-body" id="geo-stats-body">' +
        '<div class="geo-counter-row">' +
          '<div class="geo-counter-label">YOU ARE VISITOR NUMBER</div>' +
          '<div class="geo-counter-box" id="geo-visitor-num">... ... ...</div>' +
          '<div class="geo-counter-sub">FREE WEB COUNTER PROVIDED BY GEOCOUNTER.COM</div>' +
        '</div>' +
        '<div class="geo-rainbow-hr"></div>' +
        '<div class="geo-stats-grid" id="geo-stats-grid">' +
          '<div class="geo-loading">LOADING STATS... PLEASE WAIT... (dont close this window!!)</div>' +
        '</div>' +
        '<div class="geo-rainbow-hr"></div>' +
        '<div class="geo-leaderboard" id="geo-leaderboard">' +
          '<div class="geo-loading">LOADING HALL OF FAME...</div>' +
        '</div>' +
        '<div class="geo-rainbow-hr"></div>' +
        '<div id="geo-best-month-wrap"></div>' +
        '<div class="geo-awards-row" id="geo-awards-row">' +
          '<div class="geo-loading">CALCULATING AWARDS...</div>' +
        '</div>' +
      '</div>';

    if (anchor.tagName !== 'BODY') {
      anchor.parentNode.insertBefore(wrap, anchor.nextSibling);
    } else {
      var first = anchor.firstChild;
      var topBar = document.getElementById('geo-top-bar');
      var mBar   = document.getElementById('geo-marquee-bar');
      var insertAfter = mBar || topBar || first;
      if (insertAfter && insertAfter.nextSibling) {
        anchor.insertBefore(wrap, insertAfter.nextSibling);
      } else {
        anchor.appendChild(wrap);
      }
    }

    document.getElementById('geo-stats-hdr').addEventListener('click', function() {
      statsOpen = !statsOpen;
      var body = document.getElementById('geo-stats-body');
      if (body) body.style.display = statsOpen ? '' : 'none';
      var hint = this.querySelector('.geo-stats-toggle-hint');
      if (hint) hint.textContent = statsOpen ? '[click to collapse]' : '[click to expand]';
    });

    fetchStats();
  }

  /* ---- Load stats from server --------------------------- */
  function fetchStats() {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      renderStats({ error: 'No server (preview mode) -- stats unavailable' });
      return;
    }
    google.script.run
      .withSuccessHandler(renderStats)
      .withFailureHandler(function(e) { renderStats({ error: e.message || 'Unknown error' }); })
      .getGeoCitiesStats();
  }

  function padNum(n, len) {
    var s = String(n < 0 ? 0 : n);
    while (s.length < len) s = '0' + s;
    return s;
  }

  function fmtCounter(n) {
    var s = padNum(n, 6);
    var r = '';
    for (var i = 0; i < s.length; i++) r += s[i] + (i < s.length - 1 ? ' ' : '');
    return r;
  }

  /* ---- Render stats ------------------------------------- */
  function renderStats(data) {
    var visEl  = document.getElementById('geo-visitor-num');
    var gridEl = document.getElementById('geo-stats-grid');
    var lbEl   = document.getElementById('geo-leaderboard');
    var bmEl   = document.getElementById('geo-best-month-wrap');
    var awEl   = document.getElementById('geo-awards-row');

    if (!gridEl) return;

    if (data && data.error) {
      if (visEl)  visEl.textContent = '? ? ? ? ? ?';
      gridEl.innerHTML = '<div style="color:#ff6666; font-size:12px;">!! ERROR: ' + data.error + '</div>';
      if (lbEl) lbEl.innerHTML = '';
      return;
    }

    var t = data.totals || {};
    var total     = t.total     || 0;
    var completed = t.completed || 0;
    var rate      = total > 0 ? Math.round((completed / total) * 100) : 0;

    if (visEl) visEl.textContent = fmtCounter(total);

    /* Grid */
    gridEl.innerHTML =
      mkStat(t.newHire   || 0, 'NEW HIRE REQUESTS',         'geo-green')  +
      mkStat(t.eoe       || 0, 'END OF EMPLOYMENT',          'geo-red')    +
      mkStat(t.change    || 0, 'POSITION CHANGES',           'geo-cyan')   +
      mkStat(t.equip     || 0, 'EQUIPMENT REQUESTS',         'geo-yellow') +
      mkStat(completed,        'COMPLETED!! (WINNERS!!)',    'geo-green')  +
      mkStat(t.inProgress||0,  'IN PROGRESS (working on it)','geo-yellow') +
      mkStat(t.pending   ||0,  'PENDING (waiting...)',       'geo-cyan')   +
      mkStat(t.cancelled ||0,  'CANCELLED (rip)',            'geo-red')    +
      mkStat(rate + '%',       'COMPLETION RATE!!',          'geo-pink')   +
      mkStat(t.actionItems||0, 'TOTAL ACTION ITEMS',         '')           +
      mkStat(t.thisMonth ||0,  'REQUESTS THIS MONTH!!',      'geo-yellow') +
      mkStat(t.allTimeRecord||0,'BEST MONTH (all time!!)',   'geo-orange');

    /* Leaderboards */
    var lbHtml = '';

    var req = data.topRequesters || [];
    lbHtml += mkLbBox('HALL OF FAME -- TOP SUBMITTERS!!', '', req, function(x,i) {
      return ['(#' + (i+1) + ')', shortName(x.name), x.count + ' req'];
    });

    var sites = data.topSites || [];
    lbHtml += mkLbBox('MOST ACTIVE OUTPOSTS (SITES)!!', 'geo-lb-green', sites, function(x,i) {
      return ['(' + (i+1) + ')', shortName(x.name), String(x.count)];
    });

    var mgrs = data.topManagers || [];
    if (mgrs.length > 0) {
      lbHtml += mkLbBox('TOP MANAGERS (MOST ACTIVITY)!!', 'geo-lb-blue', mgrs, function(x,i) {
        return ['(' + (i+1) + ')', shortName(x.name), x.count + ' req'];
      });
    }

    lbEl.innerHTML = lbHtml;

    /* Best month callout */
    if (bmEl && data.bestMonth) {
      bmEl.innerHTML =
        '<div class="geo-best-month">' +
        '<div class="geo-best-month-label">BEST MONTH IN HISTORY!!</div>' +
        '<div class="geo-best-month-val">' + data.bestMonth.label + '</div>' +
        '<div class="geo-best-month-count">' + data.bestMonth.count + ' requests that month!!</div>' +
        '</div>';
    }

    /* Awards */
    var aw = '';
    aw += mkAward('[1ST]', 'BEST',     'INTRANET', '2026',   '');
    aw += mkAward('[WEB]', 'WEB',      'XCELLNCE', 'AWARD',  'geo-award-cyan');
    aw += mkAward('[SEQ]', 'MOST',     'SEQ.GATNG','AWARD',  'geo-award-green');
    if (rate >= 80) aw += mkAward('[80%]', '80PCT+', 'COMPLT.', 'CHAMP', '');
    if (total >= 50) aw += mkAward('[50+]', '50+REQ', 'MILESTNE','UNLCKD', 'geo-award-pink');
    if (total >= 100) aw += mkAward('[100]', '100 REQ','MILESTONE','PRO!!!','geo-award-cyan');
    if (sites.length > 0) aw += mkAward('[TOP]', shortName(sites[0].name, 6), 'BSYSITE', '#1!!!', 'geo-award-green');
    awEl.innerHTML = aw;
  }

  function mkStat(val, label, cls) {
    return '<div class="geo-stat-box ' + cls + '">' +
      '<span class="geo-stat-num">' + val + '</span>' +
      '<span class="geo-stat-label">' + label + '</span>' +
      '</div>';
  }

  function mkLbBox(title, cls, items, rowFn) {
    var h = '<div class="geo-lb-box ' + cls + '"><div class="geo-lb-title">' + title + '</div>';
    if (!items || items.length === 0) {
      h += '<div style="color:#555; font-size:11px; padding:4px 0;">No data yet -- be the first!!</div>';
    } else {
      for (var i = 0; i < items.length; i++) {
        var parts = rowFn(items[i], i);
        h += '<div class="geo-lb-item">' +
          '<span class="geo-lb-rank">' + parts[0] + '</span>' +
          '<span class="geo-lb-name">' + parts[1] + '</span>' +
          '<span class="geo-lb-count">' + parts[2] + '</span>' +
          '</div>';
      }
    }
    return h + '</div>';
  }

  function mkAward(icon, l1, l2, l3, cls) {
    return '<div class="geo-award ' + (cls||'') + '">' +
      '<span class="geo-trophy">' + icon + '</span>' +
      l1 + '<br>' + l2 + '<br>' + l3 +
      '</div>';
  }

  function shortName(name, max) {
    max = max || 20;
    if (!name) return 'Unknown';
    // show first part of email or just truncate
    var atIdx = name.indexOf('@');
    if (atIdx > 0) name = name.substring(0, atIdx);
    if (name.length > max) name = name.substring(0, max - 2) + '..';
    return name;
  }

  /* ---- Language swaps ----------------------------------- */
  function swapStatus(on) {
    var els = document.querySelectorAll('.status-badge, [class*="status-badge"]');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (on) {
        var orig = el.textContent.trim();
        if (!el.getAttribute('data-geo-orig')) el.setAttribute('data-geo-orig', orig);
        var mapped = STATUS_MAP[orig];
        if (mapped) el.textContent = mapped;
      } else {
        var origTxt = el.getAttribute('data-geo-orig');
        if (origTxt) el.textContent = origTxt;
      }
    }
  }

  function swapSubmit(on) {
    var btns = document.querySelectorAll('button[type="submit"], .submit-btn');
    for (var i = 0; i < btns.length; i++) {
      var btn = btns[i];
      if (on) {
        if (!btn.getAttribute('data-geo-orig')) btn.setAttribute('data-geo-orig', btn.textContent.trim());
        btn.textContent = SUBMIT_TEXTS[i % SUBMIT_TEXTS.length];
      } else {
        var origBtn = btn.getAttribute('data-geo-orig');
        if (origBtn) btn.textContent = origBtn;
      }
    }
  }

  /* ---- Title blinker ------------------------------------ */
  function startTitleBlink() {
    tIdx = 0;
    tTimer = setInterval(function() {
      tIdx = (tIdx + 1) % GEO_TITLES.length;
      document.title = GEO_TITLES[tIdx];
    }, 1800);
  }
  function stopTitleBlink() {
    if (tTimer) { clearInterval(tTimer); tTimer = null; }
    document.title = origTitle;
  }

  /* ---- Toast -------------------------------------------- */
  function toast(msg) {
    var old = document.getElementById('geo-toast');
    if (old && old.parentNode) old.parentNode.removeChild(old);
    var el = document.createElement('div');
    el.id = 'geo-toast';
    el.className = 'geo-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 4200);
  }

  /* ---- Konami code -------------------------------------- */
  document.addEventListener('keydown', function(e) {
    var code = e.keyCode || e.which;
    if (code === KONAMI[kIdx]) {
      kIdx++;
      if (kIdx === KONAMI.length) { kIdx = 0; toggle(); }
    } else {
      kIdx = (code === KONAMI[0]) ? 1 : 0;
    }
  });

  /* ---- Logo 5x click secret ----------------------------- */
  document.addEventListener('click', function(e) {
    var t = e.target;
    var isLogo = (t.tagName === 'IMG' &&
                  (t.classList.contains('logo') ||
                   (t.src && t.src.indexOf('team-signature-logos') >= 0))) ||
                 t.classList.contains('logo');
    if (!isLogo) return;
    lClicks++;
    if (lTimer) clearTimeout(lTimer);
    lTimer = setTimeout(function() { lClicks = 0; }, 2500);
    if (lClicks >= 5) { lClicks = 0; toggle(); }
  });

  /* ---- Init --------------------------------------------- */
  function init() { if (isOn()) activate(); }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 0);
  }

})();
</script>
