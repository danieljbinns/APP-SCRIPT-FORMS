<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= task.TaskName ?> — Action Item</title>
  <?!= include('Styles') ?>
  <style>
    /* ── Checklist-specific styles (not in Styles.html) ─────────── */
    .checklist-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
    .checklist-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
    .checklist-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); vertical-align: top; }
    .checklist-table tr:last-child td { border-bottom: none; }
    .item-name { font-weight: 600; display: block; margin-bottom: 2px; color: var(--text-main); }
    .audit-info { font-size: 10px; color: var(--text-dim); display: block; margin-top: 2px; }

    .status-btn-group { display: flex; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; width: fit-content; }
    .status-btn { padding: 7px 12px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; transition: all 0.2s; border-right: 1px solid var(--border-color); }
    .status-btn:last-child { border-right: none; }
    .status-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text-main); }
    .status-btn.active.pending  { background: var(--accent-amber);    color: #000; }
    .status-btn.active.complete { background: var(--accent-green-lt); color: #000; }
    .status-btn.active.not-returned { background: var(--brand-red); color: #fff; }
    .status-btn:disabled { cursor: not-allowed; opacity: 0.5; }

    .serial-input, .item-comment {
      background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color);
      padding: 6px 10px; border-radius: 4px; font-size: 13px; width: 100%; box-sizing: border-box;
    }
    .item-comment { margin-top: 5px; min-height: 38px; resize: vertical; }

    .task-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .task-badge.open   { background: rgba(235,28,45,0.10); color: var(--brand-red); border: 1px solid rgba(235,28,45,0.3); }
    .task-badge.closed { background: rgba(110,231,183,0.10); color: var(--accent-green-lt); border: 1px solid rgba(110,231,183,0.3); }

    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  </style>
</head>

<body>
  <div class="container">
    <a href="<?= getBaseUrl() ?>?form=dashboard" target="_top" class="back-link">&#8592; Back to Portal</a>

    <div class="logo-container">
      <img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png"
        alt="Team Group Companies" class="logo">
    </div>

    <div class="card-form" id="formCard">

      <span class="task-badge <?= task.Status === 'Open' ? 'open' : 'closed' ?>"><?= task.Status ?></span>
      <h1><?= task.TaskName ?></h1>
      <p class="subtitle">Action Item &middot; <?= task.TaskID ?></p>

      <hr>

      <div id="requestHeaderWrap">
        <?!= includeWithData('RequestHeader', {requestData: context}) ?>
      </div>

      <!-- Specialist section (effective date calendar widget for transfers) -->
      <div id="specialistSection" style="display:none;"></div>

      <!-- Checklist -->
      <div class="form-section">
        <h2>Verification Checklist</h2>
        <table class="checklist-table">
          <thead>
            <tr>
              <th>Item</th>
              <th width="180">Status</th>
              <th>Comments / Data</th>
            </tr>
          </thead>
          <tbody id="checklistBody"></tbody>
        </table>
      </div>

      <!-- Notes -->
      <div class="form-section">
        <h2>Notes</h2>
        <div class="form-field">
          <label>General Action Notes</label>
          <textarea id="notes" rows="3"
            placeholder="Enter any general notes or overall confirmation details..."><?= task.Notes ?></textarea>
        </div>
      </div>

      <div id="statusMessage"></div>

      <? if (task.Status === 'Open') { ?>
      <div class="actions-grid">
        <button class="btn btn-secondary" onclick="saveDraft()" id="draftBtn">Save Progress</button>
        <button class="btn btn-primary" onclick="finalComplete()" id="completeBtn">Mark Task Finalized</button>
      </div>
      <p style="font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center;">
        Saving progress records your email and timestamp for each changed item.
      </p>
      <? } else { ?>
      <div style="text-align:center;color:var(--accent-green-lt);padding:16px 0 8px;">
        <strong>&#10003; Task Finalized on
          <?= task.CompletedDate instanceof Date ? task.CompletedDate.toLocaleDateString() : task.CompletedDate ?>
        </strong>
        <div id="dashboardLinkArea" style="margin-top:16px;"></div>
      </div>
      <? } ?>

    </div><!-- /.card-form -->
  </div><!-- /.container -->

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Saving...</p>
  </div>

  <script>
    const taskId          = "<?= task.TaskID ?>";
    const taskName        = "<?= task.TaskName || '' ?>";
    const taskCategory    = "<?= task.Category ?>";
    const taskDescription = <?= JSON.stringify(task.Description || '') ?>;
    const taskDraftRaw    = <?!= task.Draft ? JSON.stringify(task.Draft) : 'null' ?>;
    const isClosed        = "<?= task.Status ?>" === "Closed";
    const contextObj      = <?!= (typeof context !== 'undefined' && context) ? JSON.stringify(context) : 'null' ?>;
    const context         = (typeof contextObj === 'string') ? JSON.parse(contextObj) : contextObj;
    const formType        = "<?= task.FormType || '' ?>";
    const formDataRaw     = <?!= task.FormData ? JSON.stringify(task.FormData) : 'null' ?>;
    let savedFormData = {};
    try { if (formDataRaw) savedFormData = JSON.parse(formDataRaw); } catch(e) {}

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    let userEmail = '';
    let taskDraft = { items: {} };

    google.script.run.withSuccessHandler(function(e) { userEmail = e || ''; }).withFailureHandler(function(){}).getCurrentUserEmail();

    try {
      if (taskDraftRaw) {
        const parsed = (typeof taskDraftRaw === 'string') ? JSON.parse(taskDraftRaw) : taskDraftRaw;
        if (typeof parsed === 'object' && parsed !== null) {
          if (Array.isArray(parsed.checkedItems)) {
            parsed.checkedItems.forEach(name => { taskDraft.items[name] = { status: 'Collected' }; });
          } else if (parsed.items) {
            taskDraft = parsed;
          }
        }
      }
    } catch (e) { console.error('Draft Parse Error:', e); }

    function getChecklistItems() {
      if (!taskDescription) return [];
      let items = [];
      try {
        let current = taskDescription.trim();
        let attempts = 0;
        while (attempts < 3 && typeof current === 'string' && (current.startsWith('[') || current.startsWith('"{') || current.startsWith('"['))) {
          try {
            let next = JSON.parse(current);
            if (next === current) break;
            current = next; attempts++;
          } catch (e) {
            if (current.startsWith('"[') && current.endsWith(']"')) {
              current = current.substring(1, current.length - 1).replace(/\\"/g, '"');
              continue;
            }
            break;
          }
        }
        if (Array.isArray(current)) {
          items = current;
        } else if (typeof current === 'string') {
          let delimiter = current.includes('|~|') ? '|~|' : ',';
          if (current.includes('\\n') && !current.includes('|~|')) delimiter = '\\n';
          else if (current.includes('\n') && !current.includes('|~|')) delimiter = '\n';
          items = current.split(delimiter);
        }
        items = items.map(s => {
          let str = String(s).trim();
          if (str.startsWith('__CAL__')) return str;
          str = str.replace(/^[\["']+|[\]"']+$/g, '').trim();
          str = str.replace(/__EFFDATE__[\d-]+/g, '').trim();
          return str;
        }).filter(s => s && s.toLowerCase() !== 'n/a' && s !== 'null');
      } catch (e) { console.error('getChecklistItems Error:', e); }
      return items;
    }

    function initChecklist() {
      const body  = document.getElementById('checklistBody');
      const items = getChecklistItems();

      if (items.length === 0) {
        body.innerHTML = '<tr><td colspan="3" style="color:var(--text-dim);text-align:center;padding:20px;">No checklist items identified.</td></tr>';
        return;
      }

      items.forEach((item) => {
        // ── Calendar marker row ────────────────────────────────────
        if (item.startsWith('__CAL__')) {
          const parts      = item.substring(7).split('__');
          const calDuration = parts[0] || '1 Month';
          const calConfirm  = parts[1] || '';
          const calAdded    = taskDraft.items['__CAL__'] && taskDraft.items['__CAL__'].status === 'Complete';
          const tr = document.createElement('tr');
          tr.id = 'cal-row';
          tr.innerHTML = `
            <td>
              <span class="item-name">Schedule Account Deletion</span>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">
                Duration: <b>${escapeHtml(calDuration)}</b>
                ${calConfirm ? ' &nbsp;·&nbsp; Confirm with: <b>' + escapeHtml(calConfirm) + '</b>' : ''}
              </div>
            </td>
            <td>
              ${calAdded
                ? `<span style="color:var(--accent-green-lt);font-weight:600;">✓ Added to Calendar</span>
                   <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${escapeHtml(taskDraft.items['__CAL__'].dateStr || '')}</div>`
                : `<button class="status-btn complete" id="calBtn" ${isClosed ? 'disabled' : ''}
                       onclick="doAddToCalendar('${escapeHtml(calDuration)}','${escapeHtml(calConfirm)}')">
                       📅 Add to Calendar
                   </button>`
              }
            </td>
            <td></td>`;
          body.appendChild(tr);
          return;
        }
        // ──────────────────────────────────────────────────────────

        const tr    = document.createElement('tr');
        const saved = taskDraft.items[item] || { status: 'Pending', comments: '', serial: '' };

        const itemLower  = item.toLowerCase();
        const isComputer = itemLower.includes('computer') || itemLower.includes('laptop') || itemLower.includes('tablet');
        const isPhone    = itemLower.includes('mobile phone') || (itemLower.includes('phone') && !itemLower.includes('system'));
        const isAssetTask = taskCategory === 'Assets';

        const serialHtml = isComputer ? `
          <div style="margin-top:8px;">
            <label style="font-size:10px;color:var(--text-muted);">Serial Number:</label>
            <input type="text" class="serial-input" value="${saved.serial || ''}" placeholder="Enter Serial/Svc Tag"
              ${isClosed ? 'disabled' : ''} onchange="updateItemData(this, 'serial', this.value)">
          </div>` : '';

        const phoneHtml = (isPhone && context && context.empPhone)
          ? '<div style="margin-top:4px;font-size:12px;color:var(--brand-red);font-weight:bold;">Number: ' + escapeHtml(context.empPhone) + '</div>'
          : '';

        const auditHtml = saved.by
          ? '<span class="audit-info">By: ' + escapeHtml(saved.by) + ' · ' + new Date(saved.at).toLocaleString() + '</span>'
          : '';

        tr.innerHTML = `
          <td>
            <span class="item-name">${escapeHtml(item)}</span>
            ${phoneHtml}
            ${auditHtml}
          </td>
          <td>
            <div class="status-btn-group" data-item="${encodeURIComponent(item)}">
              <button class="status-btn pending ${saved.status === 'Pending' ? 'active' : ''}"
                onclick="onStatusChange('Pending', this)" ${isClosed ? 'disabled' : ''}>Pending</button>
              <button class="status-btn complete ${(saved.status === 'Collected' || saved.status === 'Complete') ? 'active' : ''}"
                onclick="onStatusChange('${isAssetTask ? 'Collected' : 'Complete'}', this)" ${isClosed ? 'disabled' : ''}>${isAssetTask ? 'Collected' : 'Complete'}</button>
              ${isAssetTask ? `<button class="status-btn not-returned ${saved.status === 'Not Returned' ? 'active' : ''}"
                onclick="onStatusChange('Not Returned', this)" ${isClosed ? 'disabled' : ''}>Not Returned</button>` : ''}
            </div>
          </td>
          <td>
            <textarea class="item-comment" placeholder="Add specific comments..."
              ${isClosed ? 'disabled' : ''} onchange="updateItemData(this, 'comments', this.value)">${saved.comments || ''}</textarea>
            ${serialHtml}
          </td>`;
        body.appendChild(tr);
      });
    }

    function onStatusChange(status, btn) {
      const group = btn.parentElement;
      const name  = decodeURIComponent(group.getAttribute('data-item'));
      group.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (!taskDraft.items[name]) taskDraft.items[name] = { status: 'Pending' };
      taskDraft.items[name].status = status;
      taskDraft.items[name].by     = userEmail;
      taskDraft.items[name].at     = new Date().toISOString();
    }

    function updateItemData(el, field, value) {
      const row   = el.closest('tr');
      const group = row.querySelector('.status-btn-group');
      const name  = decodeURIComponent(group.getAttribute('data-item'));
      if (!taskDraft.items[name]) taskDraft.items[name] = { status: 'Pending' };
      taskDraft.items[name][field] = value;
      taskDraft.items[name].by     = userEmail;
      taskDraft.items[name].at     = new Date().toISOString();
    }

    function doAddToCalendar(duration, confirmWith) {
      const confirmMsg = confirmWith
        ? 'This will open Google Calendar to schedule account deletion (' + duration + ').\n\nRemember to confirm with ' + confirmWith + ' before deleting.'
        : 'This will open Google Calendar to schedule account deletion (' + duration + ').';
      if (!confirm(confirmMsg)) return;

      const matchMonths  = duration.match(/(\d+)/);
      const months       = matchMonths ? parseInt(matchMonths[1], 10) : 1;
      const deletionDate = new Date();
      deletionDate.setMonth(deletionDate.getMonth() + months);
      const pad = n => String(n).padStart(2, '0');
      const dateYMD   = deletionDate.getFullYear() + pad(deletionDate.getMonth() + 1) + pad(deletionDate.getDate());
      const nextDay   = new Date(deletionDate); nextDay.setDate(nextDay.getDate() + 1);
      const nextYMD   = nextDay.getFullYear() + pad(nextDay.getMonth() + 1) + pad(nextDay.getDate());
      const displayDate = (deletionDate.getMonth() + 1) + '/' + deletionDate.getDate() + '/' + deletionDate.getFullYear();
      const empName     = taskName.replace(/^IT Systems Deactivation\s*[-–]\s*/i, '') || 'Employee';
      const title   = encodeURIComponent('Delete Google Account — ' + empName);
      const details = encodeURIComponent([
        'Delete Google account for: ' + empName,
        confirmWith ? 'Confirm deletion with: ' + confirmWith : '',
        'Duration setting: ' + duration
      ].filter(Boolean).join('\n'));
      const calUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + title +
                     '&dates=' + dateYMD + '/' + nextYMD + '&details=' + details;
      window.open(calUrl, '_blank');
      taskDraft.items['__CAL__'] = { status: 'Complete', dateStr: displayDate, at: new Date().toISOString() };
      const calRow = document.getElementById('cal-row');
      if (calRow) {
        calRow.cells[1].innerHTML =
          '<span style="color:var(--accent-green-lt);font-weight:600;">✓ Calendar Opened</span>' +
          '<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">Scheduled for ' + displayDate + ' — save the event in Google Calendar</div>';
      }
      saveDraft();
    }

    function saveDraft() {
      const btn   = document.getElementById('draftBtn');
      const notes = document.getElementById('notes').value;
      const draft = JSON.stringify(taskDraft);
      const overlay = document.getElementById('loading-overlay');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
      if (overlay) overlay.style.display = 'flex';

      google.script.run
        .withSuccessHandler(() => {
          if (overlay) overlay.style.display = 'none';
          if (btn) { btn.disabled = false; btn.textContent = 'Save Progress'; }
          location.reload();
        })
        .withFailureHandler(function(err) {
          if (overlay) overlay.style.display = 'none';
          if (btn) { btn.disabled = false; btn.textContent = 'Save Progress'; }
          const sm = document.getElementById('statusMessage');
          if (sm) sm.innerHTML = '<div class="callout callout-warning">&#10060; Error saving: ' + escapeHtml(err.message) + '</div>';
        })
        .saveActionItemDraft(taskId, notes, draft);
    }

    function finalComplete() {
      const items = getChecklistItems();
      let pendingCount = 0;
      items.forEach(item => {
        if (item.startsWith('__CAL__')) return;
        const saved = taskDraft.items[item];
        if (!saved || saved.status === 'Pending') pendingCount++;
      });
      if (pendingCount > 0) {
        const sm = document.getElementById('statusMessage');
        if (sm) sm.innerHTML = '<div class="callout callout-warning">&#10060; All items must be marked Complete or Not Returned before finalizing.</div>';
        return;
      }
      let missingComments = false;
      for (let itemName in taskDraft.items) {
        if (itemName === '__CAL__') continue;
        const itemData = taskDraft.items[itemName];
        if (itemData.status === 'Not Returned' && (!itemData.comments || !itemData.comments.trim())) {
          missingComments = true; break;
        }
      }
      if (missingComments) {
        const sm = document.getElementById('statusMessage');
        if (sm) sm.innerHTML = '<div class="callout callout-warning">&#10060; Please add a comment for any items marked as "Not Returned".</div>';
        return;
      }

      const btn     = document.getElementById('completeBtn');
      const overlay = document.getElementById('loading-overlay');
      const notesVal = document.getElementById('notes').value;
      if (btn) { btn.disabled = true; btn.textContent = 'Finalizing...'; }
      if (overlay) overlay.style.display = 'flex';

      google.script.run
        .withSuccessHandler((res) => {
          if (overlay) overlay.style.display = 'none';
          if (res.success) {
            google.script.run
              .withSuccessHandler(function(url) {
                document.getElementById('formCard').innerHTML =
                  '<div style="text-align:center;padding:48px 24px;">' +
                  '<div style="font-size:48px;margin-bottom:16px;">&#10003;</div>' +
                  '<h1 style="color:var(--accent-green-lt);margin:0 0 8px;">Task Finalized</h1>' +
                  '<p style="color:var(--text-muted);">All checklist data and audit logs have been recorded.</p>' +
                  '<a href="' + url + '?form=dashboard" target="_top" style="display:inline-block;margin-top:24px;padding:12px 28px;background:var(--brand-red);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px;">Go to Dashboard</a>' +
                  '</div>';
              })
              .withFailureHandler(function() {
                document.getElementById('formCard').innerHTML =
                  '<div style="text-align:center;padding:48px 24px;">' +
                  '<h1 style="color:var(--accent-green-lt);">&#10003; Task Finalized</h1>' +
                  '<a href="?form=dashboard" target="_top" style="display:inline-block;margin-top:24px;padding:12px 28px;background:var(--brand-red);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;">Go to Dashboard</a>' +
                  '</div>';
              })
              .getBaseUrl();
          } else {
            if (btn) { btn.disabled = false; btn.textContent = 'Mark Task Finalized'; }
            const sm = document.getElementById('statusMessage');
            if (sm) sm.innerHTML = '<div class="callout callout-warning">&#10060; ' + escapeHtml(res.message || 'Server returned failure.') + '</div>';
          }
        })
        .withFailureHandler(function(err) {
          if (overlay) overlay.style.display = 'none';
          if (btn) { btn.disabled = false; btn.textContent = 'Mark Task Finalized'; }
          const sm = document.getElementById('statusMessage');
          if (sm) sm.innerHTML = '<div class="callout callout-warning">&#10060; Error: ' + escapeHtml(err.message) + '</div>';
        })
        .closeActionItemWithNotes(taskId, notesVal, JSON.stringify(taskDraft), collectFormData());
    }

    function renderSpecialistSection() {
      var el = document.getElementById('specialistSection');
      if (!el) return;
      if (typeof taskDescription !== 'string') return;
      var effDateM = taskDescription.match(/__EFFDATE__(\d{4}-\d{2}-\d{2})/);
      if (!effDateM) return;
      var effDate    = effDateM[1];
      var effDateCal = effDate.replace(/-/g, '');
      var calEmpName = (context && context.employeeName) ? encodeURIComponent('Transfer: ' + context.employeeName) : encodeURIComponent('Incoming Transfer');
      var calDets    = encodeURIComponent('Effective date for incoming personnel transfer.');
      var calHref    = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + calEmpName + '&dates=' + effDateCal + '%2F' + effDateCal + '&details=' + calDets;
      el.innerHTML =
        '<div class="callout" style="margin-bottom:0;">' +
        '<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:6px;">Effective Date</div>' +
        '<strong style="font-size:16px;">' + escapeHtml(effDate) + '</strong><br>' +
        '<a href="' + calHref + '" target="_blank" style="display:inline-block;margin-top:10px;padding:8px 16px;background:var(--brand-red);color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;">+ Add to Calendar</a>' +
        '</div>';
      el.style.display = 'block';
    }

    function collectFormData() { return null; }

    window.onload = function() {
      initChecklist();
      renderSpecialistSection();
      if (isClosed) {
        var area = document.getElementById('dashboardLinkArea');
        if (area) {
          google.script.run
            .withSuccessHandler(function(url) {
              area.innerHTML = '<a href="' + url + '?form=dashboard" target="_top" style="display:inline-block;padding:12px 28px;background:var(--brand-red);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px;">Go to Dashboard</a>';
            })
            .withFailureHandler(function() {
              area.innerHTML = '<a href="?form=dashboard" target="_top" style="display:inline-block;padding:12px 28px;background:var(--brand-red);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px;">Go to Dashboard</a>';
            })
            .getBaseUrl();
        }
      }
    };
  </script>
  <?!= include('SharedComponents') ?>
</body>

</html>
