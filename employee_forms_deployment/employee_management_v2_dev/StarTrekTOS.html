  }

  function activate(theme,scale,audio){
    var wrap=document.createElement('div'); wrap.id='st-wrap'; wrap.innerHTML=buildUI(T[theme||'tos']); document.body.appendChild(wrap);
    document.body.classList.add('startrek');
    document.getElementById('st-exit').addEventListener('click',deactivate);
    document.getElementById('st-stog').addEventListener('click',function(){ statsVisible=!statsVisible; document.getElementById('st-stats').style.display=statsVisible?'block':'none'; if(statsVisible)loadStats(); });
    document.getElementById('st-ab').addEventListener('click',stToggleAudio);
    var sBtns=document.querySelectorAll('.st-sb');
    for(var i=0;i<sBtns.length;i++){ (function(btn){btn.addEventListener('click',function(){stSwitchTheme(btn.getAttribute('data-theme'));});})(sBtns[i]); }
    var kBtns=document.querySelectorAll('.st-kb');
    for(var j=0;j<kBtns.length;j++){ (function(btn){btn.addEventListener('click',function(){stSetScale(btn.getAttribute('data-scale'));});})(kBtns[j]); }
    stSwitchTheme(theme||'tos');
    stSetScale(scale||'sc-md');
    if(audio){audioEnabled=false;stToggleAudio();}
    savePref();
  }

  function deactivate(){
    stopAmbient(); stopRain();
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    restoreSwaps();
    var wrap=document.getElementById('st-wrap'); if(wrap&&wrap.parentNode) wrap.parentNode.removeChild(wrap);
    var rm=['startrek','theme-tos','theme-tng','theme-ds9','theme-voy','theme-bsg','theme-matrix','is-lcars','is-bsg','is-matrix','sc-sm','sc-md','sc-lg','sc-xl'];
    for(var i=0;i<rm.length;i++) document.body.classList.remove(rm[i]);
    statsLoaded=false;statsVisible=false;statsData=null;audioEnabled=false;
    clearPref();
  }

  function stSwitchTheme(name){
    if(!T[name]) return;
    var d=T[name], body=document.body;
    var tc=['theme-tos','theme-tng','theme-ds9','theme-voy','theme-bsg','theme-matrix','is-lcars','is-bsg','is-matrix'];
    for(var i=0;i<tc.length;i++) body.classList.remove(tc[i]);
    body.classList.add('theme-'+name);
    if(d.lcars) body.classList.add('is-lcars');
    if(d.bsg)   body.classList.add('is-bsg');
    if(d.matrix)body.classList.add('is-matrix');
    var ship=document.querySelector('.st-t-side');      if(ship)  ship.textContent=d.ship;
    var sec=document.getElementById('st-t-sector');     if(sec)   sec.textContent=d.sector;
    var tick=document.getElementById('st-t-text');      if(tick)  tick.innerHTML='&nbsp;&nbsp;'+d.ticker+'&nbsp;&nbsp;';
    var ai=document.getElementById('st-ai');            if(ai)    ai.innerHTML=d.alertIcon;
    var am=document.getElementById('st-am');            if(am)    am.textContent=d.alertMsg;
    var st=document.getElementById('st-stitle');        if(st)    st.textContent=d.stitle;
    var ft=document.getElementById('st-ftext');         if(ft)    ft.innerHTML='&nbsp;&nbsp;'+d.footer+'&nbsp;&nbsp;';
    if(statsLoaded&&statsData&&statsVisible){ var sb2=document.getElementById('st-sb2'); if(sb2) sb2.innerHTML=renderStats(statsData,d); }
    var sBtns=document.querySelectorAll('.st-sb');
    for(var j=0;j<sBtns.length;j++) sBtns[j].className='st-sb'+(sBtns[j].getAttribute('data-theme')===name?' on':'');
    swapStatus(name);
    swapSubmit(name);
    if(name==='matrix') startRain(); else stopRain();
    if(audioEnabled){stopAmbient();startAmbient();speakGreeting(name);}
    curTheme=name; savePref();
  }

  function stSetScale(sc){
    var scales=['sc-sm','sc-md','sc-lg','sc-xl']; for(var i=0;i<scales.length;i++) document.body.classList.remove(scales[i]);
    document.body.classList.add(sc);
    var kBtns=document.querySelectorAll('.st-kb'); for(var j=0;j<kBtns.length;j++) kBtns[j].className='st-kb'+(kBtns[j].getAttribute('data-scale')===sc?' on':'');
    curScale=sc; savePref();
  }

  function initAudio(){ if(audioCtx) return true; try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();return true;}catch(e){return false;} }
  function playOsc(freq,type,vol,dur,freqEnd){
    if(!audioCtx) return;
    var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type=type||'sine'; osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd,audioCtx.currentTime+dur*0.9);
    gain.gain.setValueAtTime(0,audioCtx.currentTime); gain.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+0.02); gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+dur+0.05);
  }
  function playTOS()   { playOsc([440,660,880,1100][Math.floor(Math.random()*4)],'sine',0.07,0.18); }
  function playLCARS() { playOsc(500,'sine',0.10,0.15,1400); }
  function playBSG()   { playOsc(330,'square',0.10,0.18); setTimeout(function(){playOsc(440,'square',0.10,0.18);},220); }
  function playMatrix(){ if(!audioCtx)return; var buf=audioCtx.createBuffer(1,Math.round(audioCtx.sampleRate*0.07),audioCtx.sampleRate),ch=buf.getChannelData(0); for(var i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*0.4; var src=audioCtx.createBufferSource();src.buffer=buf; var f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=900;f.Q.value=2; var g=audioCtx.createGain();g.gain.value=0.12; src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(); }
  var SND={tos:playTOS,tng:playLCARS,ds9:playLCARS,voy:playLCARS,bsg:playBSG,matrix:playMatrix};
  var INT={tos:[2000,5000],tng:[4000,7000],ds9:[4000,7000],voy:[4000,7000],bsg:[2500,4500],matrix:[800,2000]};
  function startAmbient(){ stopAmbient(); if(!audioEnabled||!audioCtx)return; var fn=SND[curTheme],range=INT[curTheme]||[3000,6000]; if(!fn)return; function tick(){fn();ambientTimer=setTimeout(tick,range[0]+Math.random()*(range[1]-range[0]));} ambientTimer=setTimeout(tick,range[0]*0.3); }
  function stopAmbient(){ if(ambientTimer){clearTimeout(ambientTimer);ambientTimer=null;} }
  function speakGreeting(theme){ if(!audioEnabled||!window.speechSynthesis)return; var d=T[theme];if(!d||!d.greeting)return; var rates={tos:0.85,tng:0.95,ds9:0.95,voy:0.95,bsg:1.1,matrix:0.7},pitches={tos:0.7,tng:1.0,ds9:0.95,voy:1.0,bsg:1.05,matrix:0.5}; window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(d.greeting);u.rate=rates[theme];u.pitch=pitches[theme];u.volume=0.85;window.speechSynthesis.speak(u); }
  function stToggleAudio(){ if(!audioEnabled){if(!initAudio())return;audioEnabled=true;startAmbient();speakGreeting(curTheme);}else{audioEnabled=false;stopAmbient();if(window.speechSynthesis)window.speechSynthesis.cancel();} var btn=document.getElementById('st-ab');if(btn){btn.textContent=audioEnabled?'🔊 ON':'🔇 OFF';btn.className='st-ab'+(audioEnabled?' on':'');} savePref(); }

  var CHARS='アイウエオカキクケコ01ABCDEF0123456789ヲン';
  function startRain(){ var canvas=document.getElementById('st-rain');if(!canvas)return; canvas.width=window.innerWidth;canvas.height=window.innerHeight; var ctx=canvas.getContext('2d'),sz=15,cols=Math.floor(canvas.width/sz),drops=[]; for(var i=0;i<cols;i++) drops[i]=Math.random()*-canvas.height/sz; stopRain(); rainTimer=setInterval(function(){ ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,0,canvas.width,canvas.height); for(var j=0;j<drops.length;j++){var ch=CHARS[Math.floor(Math.random()*CHARS.length)];ctx.fillStyle=(drops[j]>1&&drops[j]<3)?'#CCFFCC':'#00FF41';ctx.font=sz+'px monospace';ctx.fillText(ch,j*sz,drops[j]*sz);drops[j]++;if(drops[j]*sz>canvas.height&&Math.random()>0.975)drops[j]=0;} },55); }
  function stopRain(){ if(rainTimer){clearInterval(rainTimer);rainTimer=null;} var canvas=document.getElementById('st-rain');if(canvas)canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
  window.addEventListener('resize',function(){if(curTheme==='matrix'&&document.getElementById('st-rain'))startRain();});

  attachLogoHooks();
  try{ var saved=JSON.parse(localStorage.getItem(LS_KEY)||'null'); if(saved&&saved.on) activate(saved.theme,saved.scale,saved.audio===true); }catch(e){}
})();
</script>
