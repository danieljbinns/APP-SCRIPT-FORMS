  <div id="loading-overlay">

  <script>
    // ── Pre-population ────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', function() {
      // 1. Email username — use stored googleEmail if available, otherwise build from name
      var googleEmail = document.getElementById('ctx_googleEmail').value.replace(/^"|"$/g, '').trim();
      if (googleEmail) {
        document.getElementById('emailUsername').value = googleEmail;
      } else {
        var employeeName = <?= JSON.stringify(requestData.employeeName || '') ?>;
        if (employeeName) {
          var parts = employeeName.trim().split(/\s+/);
          if (parts.length >= 2) {
            document.getElementById('emailUsername').value =
              (parts[0] + '.' + parts[parts.length - 1]).toLowerCase();
          }
        }
      }

      // 2. Email domain
      var googleDomain = document.getElementById('ctx_googleDomain').value;
      var domainSelect = document.getElementById('emailDomain');
      if (googleDomain) {
        var domainVal = googleDomain.startsWith('@') ? googleDomain : '@' + googleDomain;
        domainSelect.value = domainVal;
      } else if (domainSelect.value === '') {
        domainSelect.value = '@team-group.com'; // default
      }

      // 3. Computer type from request
      var compType = document.getElementById('ctx_computerType').value;
      if (compType) {
        var compSelect = document.getElementById('computerType');
        if      (compType === 'Laptop (Windows)' || compType === 'Desktop (Windows)') compSelect.value = 'Windows PC';
        else if (compType.includes('Mac'))        compSelect.value = 'Mac';
        else if (compType.includes('Chromebook')) compSelect.value = 'Chromebook';
      }

      // 4. Computer serial from request
      var computerSerial = document.getElementById('ctx_computerSerial').value;
      if (computerSerial) document.getElementById('computerMake').value = computerSerial;

      // 5. Default BOSS_Access to Yes if any BOSS sites were requested
      var bossSites = document.getElementById('ctx_bossJobSites').value;
      if (bossSites) {
        var bossYes = document.querySelector('input[name="BOSS_Access"][value="Yes"]');
        if (bossYes) bossYes.checked = true;
      }
    });

    // ── Submit ────────────────────────────────────────────────
    document.getElementById('taskForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var submitBtn = document.getElementById('submitBtn');
      var statusMsg = document.getElementById('statusMessage');
      var overlay   = document.getElementById('loading-overlay');

      submitBtn.disabled = true;
      overlay.style.display = 'flex';
      statusMsg.innerHTML = '';

      var formData = {};
      var fd = new FormData(e.target);
      var seen = new Set();
      fd.forEach(function(value, key) {
        if (!seen.has(key)) {
          seen.add(key);
          var all = fd.getAll(key);
          formData[key] = all.length > 1 ? all.join(',') : value;
        }
      });

      // Default unchecked system access items to 'No'
      ['Incidents_Access', 'CAA_Access', 'Delivery_App_Access', 'Net_Promoter_Score_Access'].forEach(function(field) {
        if (!formData[field]) formData[field] = 'No';
      });

      google.script.run
        .withSuccessHandler(function(res) {
          overlay.style.display = 'none';
          if (res && res.success) {
            document.getElementById('taskForm').style.display = 'none';
            document.getElementById('requestHeaderWrap').style.display = 'none';
            document.getElementById('successTitle').textContent = 'IT Setup Complete';
            document.getElementById('successMessage').textContent = 'The requester and specialist teams have been notified.';
            document.getElementById('successRequestId').textContent = 'Workflow: ' + formData.workflowId;
            document.getElementById('successAnotherLink').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
          } else {
            statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; ' + (res.message || 'Submission failed.') + '</div>';
            submitBtn.disabled = false;
          }
        })
        .withFailureHandler(function(err) {
          overlay.style.display = 'none';
          statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; System error: ' + err.message + '</div>';
          submitBtn.disabled = false;
        })
        .submitITSetup(formData);
    });
  </script>
