<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fleetio Setup</title>
    <style>
        :root {
            --bg-color: #0c0c0c; --card-bg: #1a1a1a; --text-main: #ffffff;
            --text-muted: #a0a0a0; --brand-red: #EB1C2D; --border-color: #333;
            --input-bg: #2a2a2a; --input-border: #444; --success: #00c853;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 32px; border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .logo-container { text-align: center; margin-bottom: 24px; }
        .logo { height: 40px; }
        h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 14px; }
        .section-title { font-size: 12px; font-weight: 600; color: var(--brand-red); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 16px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .ticket-info { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 16px; margin-bottom: 24px; border: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-row { display: flex; flex-direction: column; font-size: 13px; }
        .info-row .label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
        .info-row .value { color: var(--text-main); font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
        textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 6px; padding: 12px; color: white; font-size: 14px; box-sizing: border-box; resize: vertical; }
        textarea:focus { outline: none; border-color: var(--brand-red); }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--brand-red); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; opacity: 1; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; flex-direction: column; z-index: 1000; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: var(--brand-red); animation: spin 1s linear infinite; margin-bottom: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #success-screen { display: none; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
<div class="container">
<div style="padding:6px 0 14px;"><a href="<?= getBaseUrl() ?>?form=dashboard" target="_top" style="color:#666;text-decoration:none;font-size:12px;font-family:inherit;">&#8592; Back to Portal</a></div>
<div class="card" id="mainCard">
    <div class="logo-container">
        <img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png" class="logo" alt="TEAM Group">
    </div>
    <h1>Fleetio Setup</h1>
    <p class="subtitle">Please confirm this setup task is complete.</p>

    <div class="section-title">Request Details</div>
    <div class="ticket-info">
        <div class="info-row"><span class="label">Employee</span><span class="value"><?= requestData.employeeName || '-' ?></span></div>
        <div class="info-row"><span class="label">Start Date</span><span class="value"><?= requestData.hireDate || '-' ?></span></div>
        <div class="info-row"><span class="label">Job Title</span><span class="value"><?= requestData.jobTitle || '-' ?></span></div>
        <div class="info-row"><span class="label">JR Title</span><span class="value"><?= requestData.jrTitle || '-' ?></span></div>
        <div class="info-row"><span class="label">Department</span><span class="value"><?= requestData.department || '-' ?></span></div>
        <div class="info-row"><span class="label">Site</span><span class="value"><?= requestData.siteName || '-' ?></span></div>
        <div class="info-row"><span class="label">Manager</span><span class="value"><?= requestData.managerName || '-' ?></span></div>
        <div class="info-row"><span class="label">Employment Type</span><span class="value"><?= requestData.employmentType || '-' ?></span></div>
        <div class="info-row"><span class="label">Employee Type</span><span class="value"><?= requestData.employeeType || '-' ?></span></div>
        <? if (requestData.systems) { ?>
        <div class="info-row" style="grid-column: span 2;"><span class="label">Systems</span><span class="value"><?= Array.isArray(requestData.systems) ? requestData.systems.join(', ') : requestData.systems ?></span></div>
        <? } ?>
    </div>

    <div id="formSection">
        <form id="specialistForm" autocomplete="off">
            <input type="hidden" name="workflowId" value="<?= workflowId ?>">
            <input type="hidden" name="formId" value="<?= formId !== undefined ? formId : '' ?>">
            <input type="hidden" name="department" value="fleetio">
            <div class="form-group">
                <label>Confirmation Notes (Optional)</label>
                <textarea name="notes" rows="4" placeholder="Enter any specific details, confirmation codes, or notes..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary">Confirm Complete</button>
        </form>
    </div>

    <div id="success-screen">
        <div style="font-size: 56px; margin-bottom: 16px;">✅</div>
        <h2 style="color: var(--success);">Task Complete</h2>
        <p style="color: var(--text-muted); margin-top: 8px;">Returning to dashboard...</p>
    </div>
</div>
</div>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="color: white;">Saving...</div>
</div>

<script>
    function navigateToDashboard() {
        google.script.run
            .withSuccessHandler(function(url) { window.top.location.href = url + '?form=dashboard'; })
            .withFailureHandler(function() { window.top.location.href = '?form=dashboard'; })
            .getBaseUrl();
    }

    document.getElementById('specialistForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('submitBtn').disabled = true;
        var form = this;
        var data = { workflowId: form.workflowId.value, department: form.department.value, notes: form.notes.value };
        google.script.run
            .withSuccessHandler(function(result) {
                document.getElementById('loading-overlay').style.display = 'none';
                if (result && result.success === false) {
                    document.getElementById('submitBtn').disabled = false;
                    alert('Error: ' + (result.message || 'Server returned an error.'));
                } else {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                    setTimeout(navigateToDashboard, 2000);
                }
            })
            .withFailureHandler(function(err) {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                alert('Error: ' + err.message);
            })
            .submitSpecialistForm(data);
    };
</script>
</body>
</html>
