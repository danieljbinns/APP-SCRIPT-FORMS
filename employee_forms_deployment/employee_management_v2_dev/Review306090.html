<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30/60/90 Review Setup</title>
  <?!= include('Styles') ?>
</head>
<body>
  <div class="container">
    <a href="<?= getBaseUrl() ?>" target="_top" class="back-link">&#8592; Back to Portal</a>
    <div class="logo-container">
      <img src="https://team-signature-logos.s3.us-east-1.amazonaws.com/Team+Logo+Black+Background.png" alt="Team Group Companies" class="logo">
    </div>
    <div id="form-container" class="card-form">
      <h1>30/60/90 Review Setup</h1>
      <p class="subtitle">Confirm the JR title and attach the review document link.</p>
      <hr>
      <div id="requestHeaderWrap">
        <?!= includeWithData('RequestHeader', {requestData: requestData}) ?>
      </div>
      <form id="taskForm" autocomplete="off">
        <input type="hidden" name="workflowId" value="<?= workflowId ?>">
        <input type="hidden" name="formId" value="<?= formId !== undefined ? formId : '' ?>">
        <input type="hidden" name="department" value="review">

        <div class="form-field">
          <label>JR Title (HR-Verified) <span class="required">*</span></label>
          <select name="jrTitle" id="jrTitle" data-original-value="<?= requestData.jrTitle || requestData.jrRequested || '' ?>" required>
            <option value="">Loading titles...</option>
          </select>
          <p class="help-text">Originally requested: <strong><?= requestData.jrRequested || requestData.jrTitle || 'None' ?></strong></p>
        </div>

        <div class="form-field">
          <label>30/60/90 Document Link</label>
          <input type="url" name="documentLink" placeholder="https://docs.google.com/...">
        </div>

        <div class="form-field">
          <label>Confirmation Notes <span class="optional">(Optional)</span></label>
          <textarea name="notes" rows="4" placeholder="Enter any specific details, confirmation codes, or notes..."></textarea>
        </div>
        <div id="statusMessage"></div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Confirm Complete</button>
      </form>
      <?!= includeWithData('SuccessScreen', {baseUrl: getBaseUrl()}) ?>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Saving...</p>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function() {
      google.script.run
        .withSuccessHandler(function(jrs) {
          var select = document.getElementById('jrTitle');
          var originalValue = select.getAttribute('data-original-value');
          select.innerHTML = '<option value="">-- Select Confirmed Title --</option>';
          if (jrs && jrs.length) {
            jrs.forEach(function(jr) {
              var option = document.createElement('option');
              option.value = jr; option.textContent = jr;
              if (jr === originalValue) option.selected = true;
              select.appendChild(option);
            });
          }
          if (originalValue && (!jrs || !jrs.includes(originalValue))) {
            var option = document.createElement('option');
            option.value = originalValue;
            option.textContent = originalValue + ' (Original Requested)';
            option.selected = true;
            select.appendChild(option);
          }
        })
        .withFailureHandler(function() {
          document.getElementById('jrTitle').innerHTML = '<option value="">Error loading titles</option>';
        })
        .getJRsList();
    });

    document.getElementById('taskForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = e.target;
      var data = {
        workflowId: form.workflowId.value,
        department: form.department.value,
        notes: form.notes.value,
        documentLink: form.documentLink.value,
        jrTitle: form.jrTitle.value
      };
      submitSpecialistTask(e.target, data, '30/60/90 Review Scheduled', 'Submission recorded.');
    });
  </script>
  <?!= include('SharedComponents') ?>
</body>
</html>
