<!--
  ══════════════════════════════════════════════════════════════════
  IT Confirmation Pattern — reusable gatekeeper between HR and IT Setup
  ══════════════════════════════════════════════════════════════════
  Purpose:
    Dave Langohr reviews the full request after HR has verified and corrected
    employee details. He can edit any field before IT proceeds with provisioning.
    Applies to: new hire (NEW_EMP_), equipment request (EQUIP_REQ_), status
    change (CHANGE_). Does NOT apply to terminations.

  Server-side (BOSSReviewHandler.js → serveITConfirmation):
    - Detects workflow type from ID prefix (NEW_EMP_ / EQUIP_REQ_ → InitialRequest.html,
      CHANGE_ → PositionSiteChangeRequest.html).
    - Passes to template: mode='it_confirmation', baseMode=<original mode>,
      workflowId, requestData (JSON string), referenceData (JSON string).
    - getFullNewHireData / getFullPositionChangeData read the full row from the
      relevant sheet and return all fields as a flat object.
    - submitITConfirmation writes corrections back in-place to Initial Requests sheet,
      appends an audit row to IT Confirmation Results, and triggers the IT Setup email.

  Client-side (InitialRequest.html / PositionSiteChangeRequest.html):
    - FORM_MODE='it_confirmation' detected from <?= mode ?> template var.
    - INJECTED_REQUEST_DATA holds the full request JSON (parsed from requestData).
    - IT_CONFIRM_WF_ID holds the workflow ID for the submit call.
    - After populateAll() populates all dropdowns and dual-lists, prefillBossReview()
      is called to pre-populate all form fields with the existing request data.
    - prefillBossReview() rebuilds dual-lists with selected values, sets radios/
      checkboxes, and fires UI toggle functions to reveal dependent sections.
    - Submit routes to google.script.run.submitITConfirmation(data) instead of the
      normal submitInitialRequest / submitPositionChangeRequest.

  Adding it_confirmation to a new form:
    1. Add FORM_MODE / INJECTED_REQUEST_DATA / IT_CONFIRM_WF_ID var injection.
    2. Skip any gatekeeper/intro section when FORM_MODE==='it_confirmation'.
    3. Write a prefill<FormName>(d) function that sets all field values from d.
    4. Call prefill at end of dropdown population callback.
    5. Add notes textarea + change button label in it_confirmation mode.
    6. Route submit to submitITConfirmation and show success screen.
  ══════════════════════════════════════════════════════════════════
-->
<script>
  /* ══════════════════════════════════════════════════════════════
     Dual-List Picker — shared widget
     Usage: buildDualList(containerId, items, fieldName, selected)
       containerId — id of the placeholder <div>
       items       — full list of options (string[])
       fieldName   — hidden input name written to the form
       selected    — pre-selected values (string[], optional)
     The widget writes a comma-separated hidden input on every
     change so standard form serialisation picks it up.
  ══════════════════════════════════════════════════════════════ */
  /* ══════════════════════════════════════════════════════════════
     submitSpecialistTask — shared submit handler for all specialist
     and simple action forms that call submitSpecialistForm().

     Usage:
       document.getElementById('taskForm').addEventListener('submit', function(e) {
         e.preventDefault();
         // optional pre-submit validation here — return early if invalid
         var data = { workflowId: ..., department: ..., notes: ..., details: ... };
         submitSpecialistTask(e.target, data, 'Setup Complete', 'Submission recorded.');
       });

     Parameters:
       formEl         — the <form> element to hide on success (pass e.target)
       data           — object passed to submitSpecialistForm()
       successTitle   — text shown in #successTitle
       successMessage — text shown in #successMessage
  ══════════════════════════════════════════════════════════════ */
  function submitSpecialistTask(formEl, data, successTitle, successMessage) {
    var submitBtn = document.getElementById('submitBtn');
    var statusMsg = document.getElementById('statusMessage');
    var overlay   = document.getElementById('loading-overlay');

    submitBtn.disabled = true;
    overlay.classList.add('active');
    statusMsg.innerHTML = '';

    google.script.run
      .withSuccessHandler(function(result) {
        overlay.classList.remove('active');
        if (result && result.success === false) {
          submitBtn.disabled = false;
          statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; ' + (result.message || 'Server returned an error.') + '</div>';
        } else {
          formEl.style.display = 'none';
          document.getElementById('requestHeaderWrap').style.display = 'none';
          document.getElementById('successTitle').textContent    = successTitle;
          document.getElementById('successMessage').textContent  = successMessage || 'Submission recorded.';
          document.getElementById('successRequestId').textContent = 'Workflow: ' + data.workflowId;
          document.getElementById('successAnotherLink').style.display = 'none';
          document.getElementById('success-screen').style.display = 'block';
        }
      })
      .withFailureHandler(function(err) {
        overlay.classList.remove('active');
        submitBtn.disabled = false;
        statusMsg.innerHTML = '<div class="callout callout-warning">&#10060; ' + err.message + '</div>';
      })
      .submitSpecialistForm(data);
  }

  function buildDualList(containerId, items, fieldName, selected) {
    var container = document.getElementById(containerId);
    if (!container) return;
    selected = selected || [];
    items = items || [];
    var available = items.filter(function(i) { return selected.indexOf(i) < 0; });
    var chosen    = items.filter(function(i) { return selected.indexOf(i) >= 0; });
    function render() {
      container.style.cssText = 'width:100%;display:block;';
      container.innerHTML = '';
      var hidden = document.createElement('input');
      hidden.type = 'hidden'; hidden.name = fieldName; hidden.value = chosen.join(', ');
      container.appendChild(hidden);
      var wrapper = document.createElement('div'); wrapper.className = 'dual-list-wrapper';
      function makePanel(headerText, searchId, listId) {
        var panel = document.createElement('div'); panel.className = 'dual-list-panel';
        var hdr = document.createElement('div'); hdr.className = 'dual-list-panel-header'; hdr.textContent = headerText; panel.appendChild(hdr);
        var srch = document.createElement('input'); srch.type = 'text'; srch.className = 'dual-list-search'; srch.placeholder = 'Filter...'; srch.id = searchId; panel.appendChild(srch);
        var lst = document.createElement('div'); lst.className = 'dual-list-list'; lst.id = listId; panel.appendChild(lst);
        var ftr = document.createElement('div'); ftr.className = 'dual-list-footer'; panel.appendChild(ftr);
        return { panel: panel, search: srch, list: lst, footer: ftr, header: hdr };
      }
      var av = makePanel('Available', containerId+'_av_s', containerId+'_av_l');
      var addAllBtn = document.createElement('button'); addAllBtn.type = 'button'; addAllBtn.className = 'dual-list-btn'; addAllBtn.textContent = 'Add All'; av.footer.appendChild(addAllBtn);
      var arrows = document.createElement('div'); arrows.className = 'dual-list-arrows';
      var addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.className = 'dual-list-arrow add-arrow'; addBtn.textContent = '›'; arrows.appendChild(addBtn);
      var remBtn = document.createElement('button'); remBtn.type = 'button'; remBtn.className = 'dual-list-arrow remove-arrow'; remBtn.textContent = '‹'; arrows.appendChild(remBtn);
      var sel = makePanel('Selected', containerId+'_sel_s', containerId+'_sel_l');
      var remAllBtn = document.createElement('button'); remAllBtn.type = 'button'; remAllBtn.className = 'dual-list-btn'; remAllBtn.textContent = 'Remove All'; sel.footer.appendChild(remAllBtn);
      wrapper.appendChild(av.panel); wrapper.appendChild(arrows); wrapper.appendChild(sel.panel);
      container.appendChild(wrapper);
      function buildItems(lst, arr, term) {
        lst.innerHTML = '';
        arr.forEach(function(val) {
          if (term && val.toLowerCase().indexOf(term.toLowerCase()) < 0) return;
          var item = document.createElement('div'); item.className = 'dual-list-item'; item.textContent = val; item.dataset.value = val;
          item.addEventListener('click', function() { item.classList.toggle('selected'); });
          item.addEventListener('dblclick', function() { move(val, lst === av.list ? 'add' : 'remove'); });
          lst.appendChild(item);
        });
      }
      function move(val, dir) {
        if (dir === 'add') { var i = available.indexOf(val); if (i >= 0) { available.splice(i,1); chosen.push(val); } }
        else               { var i = chosen.indexOf(val);    if (i >= 0) { chosen.splice(i,1); available.push(val); } }
        available.sort(); chosen.sort(); refresh();
      }
      function refresh() {
        av.header.textContent  = 'Available (' + available.length + ')';
        sel.header.textContent = 'Selected ('  + chosen.length   + ')';
        buildItems(av.list,  available, av.search.value);
        buildItems(sel.list, chosen,    sel.search.value);
        hidden.value = chosen.join(', ');
      }
      addBtn.addEventListener('click',    function() { av.list.querySelectorAll('.dual-list-item.selected').forEach(function(el) { move(el.dataset.value, 'add'); }); });
      remBtn.addEventListener('click',    function() { sel.list.querySelectorAll('.dual-list-item.selected').forEach(function(el) { move(el.dataset.value, 'remove'); }); });
      addAllBtn.addEventListener('click', function() { var t = av.search.value.toLowerCase(); available.filter(function(v) { return !t || v.toLowerCase().indexOf(t) >= 0; }).slice().forEach(function(v) { move(v, 'add'); }); });
      remAllBtn.addEventListener('click', function() { chosen.slice().forEach(function(v) { move(v, 'remove'); }); });
      av.search.addEventListener('input',  function() { buildItems(av.list,  available, av.search.value); });
      sel.search.addEventListener('input', function() { buildItems(sel.list, chosen,    sel.search.value); });
      refresh();
    }
    render();
  }
</script>
