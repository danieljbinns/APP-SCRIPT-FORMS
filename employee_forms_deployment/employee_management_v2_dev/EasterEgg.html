function initAudio(){if(audioCtx)return true;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();return true;}catch(e){return false;}}
function playOsc(freq,type,vol,dur,freqEnd){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.type=type||'sine';osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(freqEnd)osc.frequency.exponentialRampToValueAtTime(freqEnd,audioCtx.currentTime+dur*0.9);
  gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+0.02);gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
  osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+dur+0.05);
}

function playWho(){
  if(!audioCtx)return;
  var now=audioCtx.currentTime;
  var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.type='sawtooth';
  for(var i=0;i<16;i++){var t=now+i*0.13;osc.frequency.setValueAtTime(700-i*22+(i%2===0?90:-90),t);}
  gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.06,now+0.1);gain.gain.linearRampToValueAtTime(0.06,now+1.8);gain.gain.linearRampToValueAtTime(0,now+2.2);

}

function playGeoNotes(startOffset){
  if(!audioCtx||!geoMusicOn)return;
  var t=audioCtx.currentTime+(startOffset||0);
  for(var i=0;i<GEO_NOTES.length;i++){
    var freq=GEO_NOTES[i][0],dur=GEO_NOTES[i][1];
    var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type='square';osc.frequency.setValueAtTime(freq,t);
    gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.05,t+0.01);gain.gain.linearRampToValueAtTime(0.04,t+dur-0.02);gain.gain.linearRampToValueAtTime(0,t+dur);
    osc.start(t);osc.stop(t+dur+0.01);
    t+=dur;
  }
  var totalDur=0;for(var j=0;j<GEO_NOTES.length;j++)totalDur+=GEO_NOTES[j][1];

        osc.connect(gain);gain.connect(audioCtx.destination);
        osc.type='sine';osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
        gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(0.06,audioCtx.currentTime+0.01);gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.16);
        osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+0.18);
      },idx*100);
    })(notes[i],i);
  }
}

var SND={tos:playTOS,tng:playLCARS,ds9:playLCARS,voy:playLCARS,bsg:playBSG,matrix:playMatrix,who:playWho,office:playOffice,galpha:playGalpha};
var INT={tos:[2000,5000],tng:[4000,7000],ds9:[4000,7000],voy:[4000,7000],bsg:[2500,4500],matrix:[800,2000],who:[5000,9000],office:[6000,10000],galpha:[1500,3500]};
function startAmbient(){stopAmbient();if(!audioEnabled||!audioCtx)return;var fn=SND[curTheme],range=INT[curTheme]||[3000,6000];if(!fn)return;function tick(){fn();ambientTimer=setTimeout(tick,range[0]+Math.random()*(range[1]-range[0]));}ambientTimer=setTimeout(tick,range[0]*0.3);}
function stopAmbient(){if(ambientTimer){clearTimeout(ambientTimer);ambientTimer=null;}}
function speakGreeting(theme){if(!audioEnabled||!window.speechSynthesis)return;var d=T[theme];if(!d||!d.greeting)return;var rates={tos:0.85,tng:0.95,ds9:0.95,voy:0.95,bsg:1.1,matrix:0.7,who:0.95,office:1.05,galpha:1.3},pitches={tos:0.7,tng:1.0,ds9:0.95,voy:1.0,bsg:1.05,matrix:0.5,who:1.1,office:1.0,galpha:1.4};window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(d.greeting);u.rate=rates[theme]||0.9;u.pitch=pitches[theme]||1.0;u.volume=0.85;window.speechSynthesis.speak(u);}
function stToggleAudio(){if(!audioEnabled){if(!initAudio())return;audioEnabled=true;startAmbient();speakGreeting(curTheme);}else{audioEnabled=false;stopAmbient();if(window.speechSynthesis)window.speechSynthesis.cancel();}var btn=document.getElementById('st-ab');if(btn){btn.textContent=audioEnabled?'🔊 ON':'🔇 OFF';btn.className='st-ab'+(audioEnabled?' on':'');}savePref();}

/* ── MATRIX RAIN ─────────────────────────────────────────────── */
var CHARS='アイウエオカキクケコ01ABCDEF0123456789ヲン';
function startRain(){var canvas=document.getElementById('st-rain');if(!canvas)return;canvas.width=window.innerWidth;canvas.height=window.innerHeight;var ctx=canvas.getContext('2d'),sz=15,cols=Math.floor(canvas.width/sz),drops=[];for(var i=0;i<cols;i++)drops[i]=Math.random()*-canvas.height/sz;stopRain();rainTimer=setInterval(function(){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,0,canvas.width,canvas.height);for(var j=0;j<drops.length;j++){var ch=CHARS[Math.floor(Math.random()*CHARS.length)];ctx.fillStyle=(drops[j]>1&&drops[j]<3)?'#CCFFCC':'#00FF41';ctx.font=sz+'px monospace';ctx.fillText(ch,j*sz,drops[j]*sz);drops[j]++;if(drops[j]*sz>canvas.height&&Math.random()>0.975)drops[j]=0;}},55);}
function stopRain(){if(rainTimer){clearInterval(rainTimer);rainTimer=null;}var canvas=document.getElementById('st-rain');if(canvas){var ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}}
window.addEventListener('resize',function(){if(curTheme==='matrix'&&document.getElementById('st-rain'))startRain();});

/* ── STATS ───────────────────────────────────────────────────── */
function fetchStats(){
  if(typeof google==='undefined'||!google.script||!google.script.run){
    if(document.body.classList.contains('t-geo')){renderGeoStats({error:'No server (preview mode)'});}
    else{var el=document.getElementById('st-sload');if(el)el.textContent='OFFLINE — NO SERVER CONNECTION';}
    return;
  }
  google.script.run
    .withSuccessHandler(function(data){
      statsLoaded=true;statsData=data;
      if(document.body.classList.contains('t-geo')){renderGeoStats(data);}
      else{var body=document.getElementById('st-sb2');if(body){if(!data||data.error){body.innerHTML='<div class="st-loading" style="animation:none;color:var(--st-red)">DATA UNAVAILABLE</div>';return;}body.innerHTML=renderTrekStats(data,T[curTheme]);}}
    })
    .withFailureHandler(function(){
      if(document.body.classList.contains('t-geo')){renderGeoStats({error:'Server error'});}
      else{var el=document.getElementById('st-sload');if(el){el.textContent='TRANSMISSION FAILED';el.style.animation='none';}}
    })
    .getStarTrekStats();
}

function renderTrekStats(data,d){
  var t=data.totals||{},h='';
  h+='<div class="st-dr"><div class="st-drc"><div class="st-drs"></div></div><div class="st-drl">DRADIS — NO CONTACTS</div></div>';
  var tot=t.total||0;
  var totStr=padNum(tot,6).split('').join(' ');
  h+='<div class="st-vis"><div class="st-vl">'+d.vlabel+'</div><div class="st-vb">'+totStr+'</div><div class="st-vs">'+d.vsub+'</div></div>';
  h+='<div class="st-sg">'+
    mkSx('sg',t.newHire||0,d.s1)+mkSx('sr',t.eoe||0,d.s2)+mkSx('sc',t.change||0,d.s3)+
    mkSx('',t.completed||0,d.s4)+mkSx('',t.inProgress||0,d.s5)+mkSx('sc',t.pending||0,d.s6)+
    mkSx('sr',t.cancelled||0,d.s7)+mkSx('sb',t.thisMonth||0,d.s8)+
    mkSx('',t.actionItems||0,'Action Items')+mkSx('',t.allTimeRecord||0,'Peak Month')+
  '</div>';
  function lbRows(arr){var s='';for(var i=0;i<arr.length;i++)s+='<div class="st-lr"><span class="st-lrk">#'+(i+1)+'</span><span class="st-lrn">'+arr[i].name+'</span><span class="st-lrc">'+arr[i].count+'</span></div>';return s||'<div class="st-lr" style="color:#444">&#8212;</div>';}
  h+='<hr class="st-sep"><div class="st-lb">'+
    '<div class="st-lp"><div class="st-lt">'+d.l1+'</div>'+lbRows(data.topRequesters||[])+'</div>'+
    '<div class="st-lp l2"><div class="st-lt">'+d.l2+'</div>'+lbRows(data.topSites||[])+'</div>'+
    '<div class="st-lp l3"><div class="st-lt">'+d.l3+'</div>'+lbRows(data.topManagers||[])+'</div>'+
  '</div>';
  if(data.bestMonth)h+='<hr class="st-sep"><div style="text-align:center;font-family:var(--st-fd,monospace);font-size:var(--fs-xs,11px);color:var(--st-dim);letter-spacing:2px;padding:5px 0">PEAK: <span style="color:var(--st-hi)">'+data.bestMonth.label.toUpperCase()+' &#8212; '+data.bestMonth.count+'</span></div>';
  if(data.lastUpdated)h+='<div style="text-align:right;font-family:var(--st-fb,monospace);font-size:var(--fs-2xs,10px);color:var(--st-dim);padding-top:6px">UPDATED: '+data.lastUpdated.replace('T',' ').substring(0,19)+'</div>';
  return h;
}
function mkSx(cls,val,label){return '<div class="st-sx '+cls+'"><span class="st-sn">'+val+'</span><span class="st-sl">'+label+'</span></div>';}

function renderGeoStats(data){
  var visEl=document.getElementById('geo-visitor-num');
  var gridEl=document.getElementById('geo-stats-grid');
  var lbEl=document.getElementById('geo-leaderboard');
  var bmEl=document.getElementById('geo-best-month-wrap');
  var awEl=document.getElementById('geo-awards-row');
  if(!gridEl)return;
  if(data&&data.error){if(visEl)visEl.textContent='? ? ? ? ? ?';gridEl.innerHTML='<div style="color:#f66;font-size:12px;">!! ERROR: '+data.error+'</div>';if(lbEl)lbEl.innerHTML='';return;}
  var t=data.totals||{};
  var total=t.total||0,completed=t.completed||0;
  var rate=total>0?Math.round((completed/total)*100):0;
  if(visEl)visEl.textContent=fmtCounter(total);
  function gStat(v,l,c){return '<div class="geo-stat-box '+(c||'')+'"><span class="geo-stat-num">'+v+'</span><span class="geo-stat-label">'+l+'</span></div>';}
  gridEl.innerHTML=
    gStat(t.newHire||0,'NEW HIRE REQUESTS','gg')+gStat(t.eoe||0,'END OF EMPLOYMENT','gr')+
    gStat(t.change||0,'POSITION CHANGES','gc')+gStat(t.equip||0,'EQUIPMENT REQUESTS','gy')+
    gStat(completed,'COMPLETED!! (WINNERS!!)','gg')+gStat(t.inProgress||0,'IN PROGRESS (working on it)','gy')+
    gStat(t.pending||0,'PENDING (waiting...)','gc')+gStat(t.cancelled||0,'CANCELLED (rip)','gr')+
    gStat(rate+'%','COMPLETION RATE!!','gp')+gStat(t.actionItems||0,'TOTAL ACTION ITEMS','')+
    gStat(t.thisMonth||0,'REQUESTS THIS MONTH!!','gy')+gStat(t.allTimeRecord||0,'BEST MONTH (all time!!)','go');
  function mkLb(title,cls,items,fn){
    var h='<div class="geo-lb-box '+cls+'"><div class="geo-lb-title">'+title+'</div>';
    if(!items||!items.length){h+='<div style="color:#555;font-size:11px;padding:4px 0">No data yet -- be the first!!</div>';}
    else{for(var i=0;i<items.length;i++){var p=fn(items[i],i);h+='<div class="geo-lb-item"><span class="geo-lb-rank">'+p[0]+'</span><span class="geo-lb-name">'+p[1]+'</span><span class="geo-lb-count">'+p[2]+'</span></div>';}}
    return h+'</div>';
  }
  lbEl.innerHTML=
    mkLb('HALL OF FAME -- TOP SUBMITTERS!!','',data.topRequesters||[],function(x,i){return['(#'+(i+1)+')',sn(x.name),x.count+' req'];})+
    mkLb('MOST ACTIVE OUTPOSTS (SITES)!!','lb3',data.topSites||[],function(x,i){return['('+(i+1)+')',sn(x.name),String(x.count)];})+
    mkLb('TOP MANAGERS (MOST ACTIVITY)!!','lb2',data.topManagers||[],function(x,i){return['('+(i+1)+')',sn(x.name),x.count+' req'];});
  if(bmEl&&data.bestMonth)bmEl.innerHTML='<div class="geo-best-month"><div class="geo-best-month-label">BEST MONTH IN HISTORY!!</div><div class="geo-best-month-val">'+data.bestMonth.label+'</div><div class="geo-best-month-count">'+data.bestMonth.count+' requests that month!!</div></div>';
  var aw='';
  aw+=mkAw('[1ST]','BEST','INTRANET','2026','');aw+=mkAw('[WEB]','WEB','XCELLNCE','AWARD','ac');aw+=mkAw('[SEQ]','MOST','SEQ.GATNG','AWARD','ag');
  if(rate>=80)aw+=mkAw('[80%]','80PCT+','COMPLT.','CHAMP','');
  if(total>=50)aw+=mkAw('[50+]','50+REQ','MILESTNE','UNLCKD','ap');
  if(total>=100)aw+=mkAw('[100]','100 REQ','MILESTONE','PRO!!!','ac');
  if(awEl)awEl.innerHTML=aw;
}
function fmtCounter(n){var s=padNum(n,6),r='';for(var i=0;i<s.length;i++)r+=s[i]+(i<s.length-1?' ':'');return r;}
function sn(name,max){max=max||20;if(!name)return'Unknown';var a=name.indexOf('@');if(a>0)name=name.substring(0,a);if(name.length>max)name=name.substring(0,max-2)+'..';return name;}
function mkAw(icon,l1,l2,l3,cls){return'<div class="geo-award '+(cls||'')+'"><span class="geo-trophy">'+icon+'</span>'+l1+'<br>'+l2+'<br>'+l3+'</div>';}

/* ── TOAST ───────────────────────────────────────────────────── */
function toast(msg){
  var old=document.getElementById('eg-toast');if(old&&old.parentNode)old.parentNode.removeChild(old);
  var el=document.createElement('div');el.id='eg-toast';el.className='eg-toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},4500);
}
